<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Shows • Plueto TV</title>
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <link rel="stylesheet" href="navbar.css">
  <script src="navbar.js" defer></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 32px;
      background:rgba(10,10,14,.82);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .logo{
      font-size:24px;
      font-weight:800;
      letter-spacing:.04em;
      color:var(--purple);
    }

    .nav-links{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      color:var(--muted);
    }

    .nav-links a:hover{color:white}

    .page{
      padding:30px 32px 54px;
    }

    .page-title{
      font-size:2rem;
      font-weight:900;
      margin-bottom:10px;
    }

    .page-desc{
      color:var(--muted);
      margin-bottom:22px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(170px,1fr));
      gap:18px;
    }

    .card{
      display:block;
      transition:transform .18s ease;
    }

    .card:hover{transform:translateY(-5px)}

    .poster-wrap{
      width:100%;
      aspect-ratio:2/3;
      border-radius:18px;
      overflow:hidden;
      background:#000;
      display:flex;
      align-items:center;
      justify-content:center;
      text-align:center;
      padding:20px;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
    }

    .fallback-title{
      font-size:1.05rem;
      font-weight:900;
      line-height:1.2;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .fallback-meta{
      font-size:.8rem;
      color:rgba(255,255,255,.72);
      line-height:1.45;
    }

    .card-body{padding:10px 4px 0}
    .card-title{
      font-weight:800;
      margin-bottom:5px;
      font-size:.96rem;
      line-height:1.25;
    }
    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }
  </style>
</head>
<body>
  <div id="navbar-mount"></div>

  <main class="page">
    <div class="page-title">TV Shows</div>
    <div class="page-desc">Only real series with episode 1 and multiple episodes make it in here.</div>
    <div class="grid" id="tv-grid"></div>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function renderTv() {
      const allTitles = Array.isArray(window.CATALOG) ? window.CATALOG : [];
      const shows = allTitles.filter(item => item.type === "tv" && Array.isArray(item.episodes) && item.episodes.length >= 3);
      const grid = document.getElementById("tv-grid");

      if (!shows.length) {
        grid.innerHTML = `<div class="meta">No TV entries yet.</div>`;
        return;
      }

      grid.innerHTML = shows.map(show => `
        <a class="card" href="watch.html?id=${encodeURIComponent(show.id)}">
          <div class="poster-wrap">
            <div>
              <div class="fallback-title">${escapeHtml(show.title)}</div>
              <div class="fallback-meta">
                ${escapeHtml(show.year || "—")} • SERIES<br>
                ${show.episodes.length} episodes
              </div>
            </div>
          </div>
          <div class="card-body">
            <div class="card-title">${escapeHtml(show.title)}</div>
            <div class="meta">${show.episodes.length} episodes • ${escapeHtml(show.rating || "TV-G")}</div>
          </div>
        </a>
      `).join("");
    }

    loadNavbar("tv");
    renderTv();
  </script>
</body>
</html>
