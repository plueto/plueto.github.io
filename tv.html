<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>TV Shows • Plueto TV</title>
  <script src="catalog.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#141414;color:#fff;font-family:Arial,Helvetica,sans-serif}
    a{text-decoration:none;color:#fff}
    .navbar{padding:22px 32px;display:flex;justify-content:space-between;align-items:center;background:#111;position:sticky;top:0;z-index:20}
    .logo{font-size:24px;font-weight:700;color:#e50914}
    .nav-links{display:flex;gap:18px}
    .page{padding:28px 32px 50px}
    h1{font-size:42px;margin-bottom:10px}
    .sub{color:#bbb;margin-bottom:26px}
    .grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:18px}
    .card{background:#1f1f1f;border-radius:12px;overflow:hidden;display:block}
    .card img{width:100%;height:145px;object-fit:cover;display:block}
    .card-body{padding:14px}
    .card-title{font-weight:700;margin-bottom:6px}
    .meta{font-size:13px;color:#bbb}
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">PLUETO TV</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">New</a>
    </div>
  </div>

  <div class="page">
    <h1>TV Shows</h1>
    <div class="sub">Series and long-form content in your catalog.</div>
    <div class="grid" id="tv-grid"></div>
  </div>

  <script>
    const shows = CATALOG.filter(item => item.type === "series");
    document.getElementById("tv-grid").innerHTML = shows.map(item => `
      <a class="card" href="watch.html?id=${item.id}">
        <img src="${item.image}" alt="${item.title}">
        <div class="card-body">
          <div class="card-title">${item.title}</div>
          <div class="meta">${item.year} • ${item.duration} • ${item.rating}</div>
        </div>
      </a>
    `).join("");
  </script>
</body>
</html>
