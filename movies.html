<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies • Plueto TV</title>
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --red:#ff4b5c;
      --border:rgba(255,255,255,.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .navbar{
      padding:20px 32px;
      display:flex;
      justify-content:space-between;
      align-items:center;
      background:rgba(10,10,14,.82);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.05);
      position:sticky;
      top:0;
      z-index:40;
    }

    .logo{
      font-size:24px;
      font-weight:800;
      color:var(--purple);
      text-shadow:0 0 24px rgba(122,92,255,.22);
    }

    .nav-links{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      color:var(--muted);
    }

    .page{
      padding:28px 32px 50px;
    }

    h1{
      font-size:42px;
      margin-bottom:10px;
    }

    .sub{
      color:var(--muted);
      margin-bottom:22px;
      max-width:760px;
      line-height:1.5;
    }

    .signal-tag{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#d7d7e3;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .signal-tag::before{
      content:"";
      width:9px;
      height:9px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--purple),var(--blue));
      box-shadow:0 0 14px rgba(122,92,255,.45);
    }

    .filter-bar{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-bottom:24px;
    }

    .filter-btn{
      border:1px solid var(--border);
      background:rgba(255,255,255,.04);
      color:var(--text);
      padding:10px 14px;
      border-radius:999px;
      cursor:pointer;
      font-weight:700;
      transition:transform .15s ease, background .15s ease, border-color .15s ease;
    }

    .filter-btn:hover{
      transform:translateY(-1px);
      background:rgba(255,255,255,.08);
    }

    .filter-btn.active{
      background:linear-gradient(135deg,var(--purple),var(--blue));
      border-color:transparent;
    }

    .section-note{
      color:var(--muted);
      font-size:14px;
      margin-bottom:20px;
    }

    .grid{
      display:grid;
      grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
      gap:22px;
    }

    .card{
      display:block;
      transition:transform .18s ease;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .poster-wrap{
      position:relative;
      width:100%;
      aspect-ratio:2/3;
      border-radius:18px;
      overflow:hidden;
      background:var(--panel);
      box-shadow:0 12px 30px rgba(0,0,0,.28);
    }

    .poster{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      background:#111;
    }

    .poster-fallback{
      width:100%;
      height:100%;
      display:none;
      flex-direction:column;
      justify-content:flex-end;
      padding:18px;
      background:
        linear-gradient(to top, rgba(0,0,0,.92), rgba(0,0,0,.18)),
        linear-gradient(135deg, #1b1b24, #29293b);
    }

    .poster-fallback-title{
      font-size:1rem;
      font-weight:800;
      line-height:1.2;
      margin-bottom:8px;
    }

    .poster-fallback-meta{
      font-size:.82rem;
      color:#d0d0d8;
      line-height:1.35;
    }

    .card-body{
      padding:10px 4px 0;
    }

    .card-title{
      font-weight:800;
      margin-bottom:5px;
      font-size:.96rem;
      line-height:1.25;
    }

    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .card-actions{
      padding:10px 4px 0;
    }

    .my-list-btn{
      width:100%;
      border:none;
      border-radius:12px;
      padding:10px 12px;
      background:rgba(255,255,255,.08);
      color:var(--text);
      font-weight:700;
      cursor:pointer;
      transition:transform .15s ease, background .15s ease;
    }

    .my-list-btn:hover{
      transform:translateY(-1px);
      background:rgba(122,92,255,.18);
    }

    .empty-state{
      margin-top:18px;
      padding:24px;
      border-radius:18px;
      background:linear-gradient(135deg, rgba(122,92,255,.08), rgba(58,168,255,.06));
      border:1px solid rgba(255,255,255,.06);
      color:#d7d7e3;
      line-height:1.6;
    }

    .loading{
      color:var(--muted);
      font-size:15px;
    }

    @media (max-width:800px){
      .navbar,.page{padding-left:18px;padding-right:18px}
      .grid{grid-template-columns:repeat(auto-fill,minmax(150px,1fr));gap:16px}
      h1{font-size:34px}
    }
  </style>
</head>
<body>
  <div class="navbar">
    <a href="index.html" class="logo">PLUETO TV</a>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">Recently Added</a>
      <a href="my-list.html">My List</a>
    </div>
  </div>

  <div class="page">
    <div class="signal-tag">Feature Queue</div>
    <h1>Movies</h1>
    <div class="sub">
      Feature films in your catalog live here. Clean, simple, and easy to browse.
    </div>

    <div class="filter-bar" id="genre-filters"></div>
    <div class="section-note" id="movies-note"></div>

    <div class="grid" id="movies-grid">
      <div class="loading">Loading...</div>
    </div>

    <div class="empty-state" id="movies-empty" style="display:none;">
      No movie entries yet. Once you add titles with <strong>type: "movie"</strong> to your catalog, they’ll appear here automatically.
    </div>
  </div>

  <script>
    let allMovies = [];
    let posterMap = {};
    let activeGenre = "All";

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function normalizeGenre(item) {
      if (item.genre && typeof item.genre === "string") {
        if (item.genre === "Experimental Animation") return "Animation";
        if (item.genre === "Short Film") return "Drama";
        return item.genre;
      }

      if (Array.isArray(item.genres) && item.genres.length) {
        return item.genres[0];
      }

      return "Uncategorized";
    }

    function getPosterUrl(item) {
      return item.poster || posterMap[item.id] || item.image || item.fallbackImage || "";
    }

    function sortMovies(items) {
      return [...items].sort((a, b) => {
        const aIndie = a.category === "indie" ? 1 : 0;
        const bIndie = b.category === "indie" ? 1 : 0;

        if (aIndie !== bIndie) return bIndie - aIndie;
        return (b.year || 0) - (a.year || 0);
      });
    }

    function createCard(item) {
      const yearText = item.year || "Unknown year";
      const typeText = item.type || "Title";
      const safeTitle = escapeHtml(item.title || "Untitled");
      const safeId = escapeHtml(item.id || "");
      const safeImage = escapeHtml(getPosterUrl(item));
      const safeDuration = escapeHtml(item.duration || "Runtime unavailable");
      const safeRating = escapeHtml(item.rating || "NR");
      const buttonLabel = escapeHtml(getMyListButtonLabel(item.id));

      return `
        <a class="card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <div class="poster-wrap">
            ${
              safeImage
                ? `<img
                    class="poster"
                    src="${safeImage}"
                    alt="${safeTitle}"
                    loading="lazy"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  >`
                : ""
            }
            <div class="poster-fallback" style="${safeImage ? "" : "display:flex;"}">
              <div class="poster-fallback-title">${safeTitle}</div>
              <div class="poster-fallback-meta">${yearText} • ${typeText}<br>${safeId}</div>
            </div>
          </div>

          <div class="card-body">
            <div class="card-title">${safeTitle}</div>
            <div class="meta">${yearText} • ${safeDuration} • ${safeRating}</div>
            <div class="card-actions">
              <button class="my-list-btn" type="button" data-id="${safeId}">${buttonLabel}</button>
            </div>
          </div>
        </a>
      `;
    }

    function wireMyListButtons(root = document) {
      root.querySelectorAll(".my-list-btn").forEach(button => {
        const id = button.dataset.id;

        button.onclick = (event) => {
          event.preventDefault();
          event.stopPropagation();

          const added = toggleMyList(id);
          button.textContent = added ? "✓ In My List" : "+ My List";
        };
      });
    }

    function renderFilters(movies) {
      const filterWrap = document.getElementById("genre-filters");

      const genres = [...new Set(
        movies.map(normalizeGenre).filter(Boolean)
      )].sort((a, b) => a.localeCompare(b));

      const allGenres = ["All", ...genres];

      filterWrap.innerHTML = allGenres.map(genre => `
        <button
          class="filter-btn ${genre === activeGenre ? "active" : ""}"
          type="button"
          data-genre="${escapeHtml(genre)}"
        >
          ${escapeHtml(genre)}
        </button>
      `).join("");

      filterWrap.querySelectorAll(".filter-btn").forEach(button => {
        button.addEventListener("click", () => {
          activeGenre = button.dataset.genre;
          renderMovieGrid();
          renderFilters(allMovies);
        });
      });
    }

    function renderMovieGrid() {
      const grid = document.getElementById("movies-grid");
      const empty = document.getElementById("movies-empty");
      const note = document.getElementById("movies-note");

      let filtered = sortMovies(allMovies);

      if (activeGenre !== "All") {
        filtered = filtered.filter(item => normalizeGenre(item) === activeGenre);
      }

      if (!filtered.length) {
        grid.innerHTML = "";
        empty.style.display = "block";
        note.textContent = "";
        return;
      }

      empty.style.display = "none";

      const indieCount = filtered.filter(item => item.category === "indie").length;
      const archiveCount = filtered.length - indieCount;

      note.textContent =
        activeGenre === "All"
          ? `Independent submissions appear first, followed by archive titles. ${indieCount} indie • ${archiveCount} archive`
          : `${filtered.length} title${filtered.length === 1 ? "" : "s"} in ${activeGenre}. Independent submissions still appear first.`;

      grid.innerHTML = filtered.map(createCard).join("");
      wireMyListButtons(grid);
    }

    async function renderMovies() {
      const grid = document.getElementById("movies-grid");
      const empty = document.getElementById("movies-empty");

      try {
        const res = await fetch("posters.json");
        posterMap = await res.json();
      } catch (err) {
        console.warn("Could not load posters.json", err);
      }

      allMovies = (Array.isArray(window.CATALOG) ? window.CATALOG : [])
        .filter(item => item.type === "movie" && item.id);

      if (!allMovies.length) {
        grid.innerHTML = "";
        empty.style.display = "block";
        return;
      }

      renderFilters(allMovies);
      renderMovieGrid();
    }

    renderMovies();
  </script>
</body>
</html>
