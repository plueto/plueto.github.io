<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Movies • Plueto TV</title>

<script src="catalog.js"></script>

<style>

body{
background:#141414;
color:white;
font-family:Arial;
margin:0;
}

.navbar{
padding:22px 32px;
display:flex;
justify-content:space-between;
background:#111;
}

.logo{
font-size:24px;
font-weight:700;
color:#e50914;
}

.page{
padding:30px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:22px;
}

.poster{
aspect-ratio:2/3;
width:100%;
border-radius:14px;
overflow:hidden;
background:#222;
position:relative;
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
}

.poster-fallback{
display:none;
position:absolute;
top:0;
left:0;
right:0;
bottom:0;
padding:16px;
background:
linear-gradient(to top,rgba(0,0,0,.9),rgba(0,0,0,.2)),
linear-gradient(135deg,#1a1a1a,#2d2d2d);
display:flex;
flex-direction:column;
justify-content:flex-end;
}

.title{
margin-top:8px;
font-weight:700;
}

.meta{
color:#bbb;
font-size:13px;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">PLUETO TV</div>
</div>

<div class="page">

<h1>Movies</h1>

<div class="grid" id="grid"></div>

</div>

<script>

function card(item){

return `
<a href="watch.html?id=${item.id}">

<div class="poster">

<img src="${item.image}"
onerror="
if(this.dataset.fallback!='1'){
this.dataset.fallback='1';
this.src='${item.fallbackImage}';
}else{
this.style.display='none';
this.nextElementSibling.style.display='flex';
}
">

<div class="poster-fallback">
<div>${item.title}</div>
<div style="font-size:12px;color:#bbb">${item.year}</div>
</div>

</div>

<div class="title">${item.title}</div>
<div class="meta">${item.year} • ${item.duration}</div>

</a>
`

}

const movies = CATALOG.filter(x=>x.type==="movie")

document.getElementById("grid").innerHTML = movies.map(card).join("")

</script>

</body>
</html>
