<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Movies • Plueto TV</title>
  <script src="catalog.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      text-decoration: none;
      color: #fff;
    }

    .navbar {
      padding: 22px 32px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      background: #111;
      position: sticky;
      top: 0;
      z-index: 20;
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #e50914;
    }

    .nav-links {
      display: flex;
      gap: 18px;
    }

    .page {
      padding: 28px 32px 50px;
    }

    h1 {
      font-size: 42px;
      margin-bottom: 10px;
    }

    .sub {
      color: #bbb;
      margin-bottom: 26px;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(auto-fill, minmax(190px, 1fr));
      gap: 22px;
    }

    .card {
      display: block;
      transition: transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 16px;
      overflow: hidden;
      background: #1b1b1b;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      background: #111;
    }

    .poster-fallback {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px;
      background:
        linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.18)),
        linear-gradient(135deg, #1a1a1a, #2b2b2b);
    }

    .poster-fallback-title {
      font-size: 1.02rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .poster-fallback-meta {
      font-size: 0.82rem;
      color: #d0d0d0;
      line-height: 1.35;
    }

    .card-body {
      padding: 12px 4px 0;
    }

    .card-title {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 0.98rem;
      line-height: 1.25;
    }

    .meta {
      font-size: 13px;
      color: #bbb;
      line-height: 1.4;
    }

    .loading {
      color: #bbb;
      font-size: 16px;
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">PLUETO TV</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">New</a>
    </div>
  </div>

  <div class="page">
    <h1>Movies</h1>
    <div class="sub">Feature films in your catalog.</div>
    <div class="grid" id="movie-grid">
      <div class="loading">Loading posters...</div>
    </div>
  </div>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function createMovieCard(item, posterUrl) {
      const yearText = item.year ? item.year : "Unknown year";
      const typeText = item.type ? item.type : "Title";
      const safeTitle = escapeHtml(item.title);
      const safeId = escapeHtml(item.id);
      const safeImage = escapeHtml(posterUrl || "");
      const safeDuration = escapeHtml(item.duration || "Full Movie");
      const safeRating = escapeHtml(item.rating || "NR");

      return `
        <a class="card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <div class="poster-wrap">
            ${
              safeImage
                ? `<img
                    class="poster"
                    src="${safeImage}"
                    alt="${safeTitle}"
                    loading="lazy"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  >`
                : ""
            }

            <div class="poster-fallback" style="${safeImage ? "" : "display:flex;"}">
              <div class="poster-fallback-title">${safeTitle}</div>
              <div class="poster-fallback-meta">${yearText} • ${typeText}<br>${safeId}</div>
            </div>
          </div>

          <div class="card-body">
            <div class="card-title">${safeTitle}</div>
            <div class="meta">${yearText} • ${safeDuration} • ${safeRating}</div>
          </div>
        </a>
      `;
    }

    async function renderMovies() {
      const grid = document.getElementById("movie-grid");
      const movies = CATALOG.filter(item => item.type === "movie");

      let posters = {};
      try {
        const res = await fetch("posters.json");
        posters = await res.json();
      } catch (err) {
        console.warn("Could not load posters.json", err);
      }

      grid.innerHTML = movies
        .map(item => createMovieCard(item, posters[item.id] || null))
        .join("");
    }

    renderMovies();
  </script>
</body>
</html>
