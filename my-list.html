<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My List • Plueto TV</title>

<script src="catalog.js"></script>

<style>

:root{
--bg:#0d0d12;
--panel:#15151d;
--text:#f4f4f5;
--muted:#a7a7b3;
--purple:#7a5cff;
--blue:#3aa8ff;
}

*{margin:0;padding:0;box-sizing:border-box}

body{
background:var(--bg);
color:var(--text);
font-family:Arial,Helvetica,sans-serif;
}

a{
text-decoration:none;
color:inherit;
}

.navbar{
padding:20px 32px;
display:flex;
justify-content:space-between;
align-items:center;
background:rgba(10,10,14,.82);
backdrop-filter:blur(12px);
border-bottom:1px solid rgba(255,255,255,.05);
position:sticky;
top:0;
z-index:40;
}

.logo{
font-size:24px;
font-weight:800;
color:var(--purple);
text-shadow:0 0 24px rgba(122,92,255,.22);
}

.nav-links{
display:flex;
gap:18px;
flex-wrap:wrap;
color:var(--muted);
}

.page{
padding:28px 32px 50px;
}

h1{
font-size:42px;
margin-bottom:10px;
}

.sub{
color:var(--muted);
margin-bottom:26px;
max-width:760px;
line-height:1.5;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fill,minmax(190px,1fr));
gap:22px;
}

.card{
display:block;
transition:transform .18s ease;
}

.card:hover{
transform:translateY(-5px);
}

.poster-wrap{
position:relative;
width:100%;
aspect-ratio:2/3;
border-radius:18px;
overflow:hidden;
background:var(--panel);
box-shadow:0 12px 30px rgba(0,0,0,.28);
}

.poster{
width:100%;
height:100%;
object-fit:cover;
display:block;
}

.card-body{
padding:10px 4px 0;
}

.card-title{
font-weight:800;
margin-bottom:5px;
font-size:.96rem;
}

.meta{
font-size:13px;
color:var(--muted);
}

.empty{
margin-top:20px;
color:var(--muted);
}

</style>
</head>

<body>

<div class="navbar">
<a href="index.html" class="logo">PLUETO TV</a>

<div class="nav-links">
<a href="index.html">Home</a>
<a href="movies.html">Movies</a>
<a href="tv.html">TV Shows</a>
<a href="new.html">Recently Added</a>
<a href="my-list.html">My List</a>
</div>
</div>

<div class="page">

<h1>My List</h1>

<div class="sub">
Anything you save will appear here.
</div>

<div class="grid" id="my-list-grid"></div>

<div class="empty" id="empty">
Your list is empty.
</div>

</div>

<script>

const grid = document.getElementById("my-list-grid")
const empty = document.getElementById("empty")

function getMyList(){
const raw = localStorage.getItem("plueto_my_list")
return raw ? JSON.parse(raw) : []
}

function render(){

const ids = getMyList()

const items = CATALOG.filter(item => ids.includes(item.id))

if(items.length === 0){
empty.style.display="block"
return
}

empty.style.display="none"

grid.innerHTML = items.map(item => `

<a class="card" href="watch.html?id=${item.id}">

<div class="poster-wrap">
<img class="poster" src="${item.image || ""}">
</div>

<div class="card-body">
<div class="card-title">${item.title}</div>
<div class="meta">${item.year || ""}</div>
</div>

</a>

`).join("")

}

render()

</script>

</body>
</html>
