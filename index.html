<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plueto TV</title>
  <script src="catalog.js"></script>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      background: #141414;
      color: #fff;
      font-family: Arial, Helvetica, sans-serif;
    }

    a {
      text-decoration: none;
      color: #fff;
    }

    .navbar {
      position: sticky;
      top: 0;
      z-index: 50;
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 20px 32px;
      background: rgba(17,17,17,0.88);
      backdrop-filter: blur(8px);
    }

    .logo {
      font-size: 24px;
      font-weight: 700;
      color: #e50914;
    }

    .nav-links {
      display: flex;
      gap: 18px;
      flex-wrap: wrap;
    }

    .hero {
      position: relative;
      min-height: 78vh;
      display: flex;
      align-items: end;
      overflow: hidden;
      background: #0f0f0f;
    }

    .hero-media {
      position: absolute;
      inset: 0;
      pointer-events: none;
    }

    .hero-media iframe {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0.34;
      transform: scale(1.2);
      filter: saturate(0.9) contrast(1.05);
    }

    .hero-overlay {
      position: absolute;
      inset: 0;
      background:
        linear-gradient(to top, rgba(20,20,20,1) 0%, rgba(20,20,20,0.75) 30%, rgba(20,20,20,0.18) 60%, rgba(20,20,20,0.08) 100%),
        linear-gradient(to right, rgba(20,20,20,0.88) 0%, rgba(20,20,20,0.5) 35%, rgba(20,20,20,0.15) 65%, rgba(20,20,20,0.1) 100%);
    }

    .hero-content {
      position: relative;
      z-index: 2;
      max-width: 720px;
      padding: 0 32px 46px;
    }

    .hero-kicker {
      color: #bdbdbd;
      font-size: 13px;
      letter-spacing: 0.12em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }

    .hero-title {
      font-size: clamp(2.2rem, 6vw, 4.8rem);
      line-height: 0.95;
      font-weight: 800;
      margin-bottom: 16px;
    }

    .hero-meta {
      display: flex;
      flex-wrap: wrap;
      gap: 10px;
      margin-bottom: 16px;
      color: #d3d3d3;
      font-size: 0.95rem;
    }

    .hero-pill {
      padding: 7px 11px;
      border-radius: 999px;
      background: rgba(255,255,255,0.08);
      border: 1px solid rgba(255,255,255,0.14);
    }

    .hero-desc {
      color: #e4e4e4;
      line-height: 1.6;
      font-size: 1rem;
      max-width: 650px;
      margin-bottom: 22px;
    }

    .hero-actions {
      display: flex;
      gap: 12px;
      flex-wrap: wrap;
    }

    .hero-btn {
      display: inline-flex;
      align-items: center;
      justify-content: center;
      min-height: 46px;
      padding: 0 18px;
      border-radius: 999px;
      font-weight: 700;
      border: 0;
      cursor: pointer;
    }

    .hero-btn-primary {
      background: #fff;
      color: #000;
    }

    .hero-btn-secondary {
      background: rgba(255,255,255,0.1);
      color: #fff;
      border: 1px solid rgba(255,255,255,0.14);
    }

    .content {
      padding: 26px 32px 50px;
    }

    .row-section {
      margin-bottom: 34px;
    }

    .row-title {
      font-size: 1.35rem;
      font-weight: 700;
      margin-bottom: 16px;
    }

    .row-track {
      display: grid;
      grid-auto-flow: column;
      grid-auto-columns: minmax(170px, 190px);
      gap: 18px;
      overflow-x: auto;
      padding-bottom: 8px;
      scroll-behavior: smooth;
    }

    .row-track::-webkit-scrollbar {
      height: 8px;
    }

    .row-track::-webkit-scrollbar-thumb {
      background: #333;
      border-radius: 999px;
    }

    .card {
      display: block;
      transition: transform 0.18s ease;
    }

    .card:hover {
      transform: translateY(-4px);
    }

    .poster-wrap {
      position: relative;
      width: 100%;
      aspect-ratio: 2 / 3;
      border-radius: 16px;
      overflow: hidden;
      background: #1b1b1b;
      box-shadow: 0 10px 24px rgba(0,0,0,0.28);
    }

    .poster {
      width: 100%;
      height: 100%;
      object-fit: cover;
      object-position: center;
      display: block;
      background: #111;
    }

    .poster-fallback {
      width: 100%;
      height: 100%;
      display: none;
      flex-direction: column;
      justify-content: flex-end;
      padding: 18px;
      background:
        linear-gradient(to top, rgba(0,0,0,0.92), rgba(0,0,0,0.18)),
        linear-gradient(135deg, #1a1a1a, #2b2b2b);
    }

    .poster-fallback-title {
      font-size: 1rem;
      font-weight: 700;
      line-height: 1.2;
      margin-bottom: 8px;
    }

    .poster-fallback-meta {
      font-size: 0.82rem;
      color: #d0d0d0;
      line-height: 1.35;
    }

    .card-body {
      padding: 10px 4px 0;
    }

    .card-title {
      font-weight: 700;
      margin-bottom: 6px;
      font-size: 0.95rem;
      line-height: 1.25;
    }

    .meta {
      font-size: 13px;
      color: #bbb;
      line-height: 1.4;
    }

    .loading {
      color: #bbb;
      font-size: 16px;
    }

    @media (max-width: 800px) {
      .navbar {
        padding: 18px;
      }

      .hero-content,
      .content {
        padding-left: 18px;
        padding-right: 18px;
      }

      .row-track {
        grid-auto-columns: minmax(145px, 160px);
      }

      .hero {
        min-height: 72vh;
      }

      .hero-media iframe {
        opacity: 0.25;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="logo">PLUETO TV</div>
    <div class="nav-links">
      <a href="index.html">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">New</a>
      <a href="#my-list">My List</a>
    </div>
  </div>

  <section class="hero" id="hero">
    <div class="hero-media" id="hero-media"></div>
    <div class="hero-overlay"></div>
    <div class="hero-content" id="hero-content">
      <div class="loading">Loading featured title...</div>
    </div>
  </section>

  <main class="content">
    <section class="row-section">
      <div class="row-title">Continue Watching</div>
      <div class="row-track" id="continue-row">
        <div class="loading">Loading...</div>
      </div>
    </section>

    <section class="row-section" id="my-list">
      <div class="row-title">My List</div>
      <div class="row-track" id="my-list-row">
        <div class="loading">Loading...</div>
      </div>
    </section>

    <section class="row-section">
      <div class="row-title">Featured Movies</div>
      <div class="row-track" id="featured-row">
        <div class="loading">Loading...</div>
      </div>
    </section>

    <section class="row-section">
      <div class="row-title">Horror</div>
      <div class="row-track" id="horror-row">
        <div class="loading">Loading...</div>
      </div>
    </section>

    <section class="row-section">
      <div class="row-title">Sci-Fi</div>
      <div class="row-track" id="scifi-row">
        <div class="loading">Loading...</div>
      </div>
    </section>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function getMyList() {
      return JSON.parse(localStorage.getItem("pluetoMyList") || "[]");
    }

    function createMovieCard(item, posterUrl) {
      const yearText = item.year ? item.year : "Unknown year";
      const typeText = item.type ? item.type : "Title";
      const safeTitle = escapeHtml(item.title);
      const safeId = escapeHtml(item.id);
      const safeImage = escapeHtml(posterUrl || "");
      const safeDuration = escapeHtml(item.duration || "Full Movie");
      const safeRating = escapeHtml(item.rating || "NR");

      return `
        <a class="card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <div class="poster-wrap">
            ${
              safeImage
                ? `<img
                    class="poster"
                    src="${safeImage}"
                    alt="${safeTitle}"
                    loading="lazy"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  >`
                : ""
            }
            <div class="poster-fallback" style="${safeImage ? "" : "display:flex;"}">
              <div class="poster-fallback-title">${safeTitle}</div>
              <div class="poster-fallback-meta">${yearText} • ${typeText}<br>${safeId}</div>
            </div>
          </div>

          <div class="card-body">
            <div class="card-title">${safeTitle}</div>
            <div class="meta">${yearText} • ${safeDuration} • ${safeRating}</div>
          </div>
        </a>
      `;
    }

    function renderRow(rowId, items, posters) {
      const row = document.getElementById(rowId);
      if (!row) return;

      if (!items.length) {
        row.innerHTML = `<div class="loading">Nothing here yet.</div>`;
        return;
      }

      row.innerHTML = items
        .map(item => createMovieCard(item, posters[item.id] || null))
        .join("");
    }

    function renderHero(item) {
      const heroMedia = document.getElementById("hero-media");
      const heroContent = document.getElementById("hero-content");

      heroMedia.innerHTML = `
        <iframe
          src="${item.preview}?autoplay=1&muted=1"
          title="${escapeHtml(item.title)} preview"
          allow="autoplay; fullscreen"
          loading="lazy">
        </iframe>
      `;

      heroContent.innerHTML = `
        <div class="hero-kicker">Featured Presentation</div>
        <div class="hero-title">${escapeHtml(item.title)}</div>

        <div class="hero-meta">
          <span class="hero-pill">${escapeHtml(item.year || "—")}</span>
          <span class="hero-pill">${escapeHtml(item.rating || "NR")}</span>
          <span class="hero-pill">${escapeHtml(item.duration || "Full Movie")}</span>
          <span class="hero-pill">${escapeHtml(item.row || "Featured")}</span>
        </div>

        <div class="hero-desc">${escapeHtml(item.description || "")}</div>

        <div class="hero-actions">
          <a class="hero-btn hero-btn-primary" href="watch.html?id=${encodeURIComponent(item.id)}">▶ Play</a>
          <button class="hero-btn hero-btn-secondary" onclick="toggleMyList('${item.id}')">+ My List</button>
        </div>
      `;
    }

    async function renderHome() {
      let posters = {};
      try {
        const res = await fetch("posters.json");
        posters = await res.json();
      } catch (err) {
        console.warn("Could not load posters.json", err);
      }

      const movies = CATALOG.filter(item => item.type === "movie");
      const myListIds = getMyList();
      const myListItems = movies.filter(item => myListIds.includes(item.id));

      const heroItem =
        movies.find(item => item.id === "fantastic-planet__1973") ||
        movies[0];

      renderHero(heroItem);
      renderRow("continue-row", movies.slice(0, 6), posters);
      renderRow("my-list-row", myListItems, posters);
      renderRow("featured-row", movies.slice(0, 6), posters);
      renderRow("horror-row", movies.filter(item => item.row === "Horror"), posters);
      renderRow("scifi-row", movies.filter(item => item.row === "Sci-Fi"), posters);
    }

    renderHome();
  </script>
</body>
</html>
