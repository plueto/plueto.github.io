<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Streaming Site</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
}

body{
background:#141414;
color:white;
font-family:Arial;
}

.navbar{
position:fixed;
top:0;
width:100%;
display:flex;
justify-content:space-between;
padding:20px 40px;
background:rgba(0,0,0,0.8);
z-index:10;
}

.logo{
font-size:24px;
font-weight:bold;
color:#e50914;
}

.hero{
height:70vh;
background:url("https://images.unsplash.com/photo-1489599849927-2ee91cede3ba?auto=format&fit=crop&w=1600&q=80") center/cover;
display:flex;
align-items:flex-end;
padding:60px;
}

.hero h1{
font-size:48px;
}

.content{
padding:30px 40px;
}

.row{
margin-bottom:30px;
}

.row h2{
margin-bottom:10px;
}

.row-posters{
display:flex;
gap:10px;
overflow-x:auto;
}

.poster{
min-width:220px;
height:125px;
border-radius:6px;
overflow:hidden;
transition:transform .25s;
background:#222;
position:relative;
flex-shrink:0;
display:block;
color:white;
text-decoration:none;
}

.poster img{
width:100%;
height:100%;
object-fit:cover;
}

.poster:hover{
transform:scale(1.12);
}

.poster-title{
position:absolute;
bottom:10px;
left:10px;
font-size:14px;
font-weight:bold;
}

</style>
</head>

<body>

<div class="navbar">
<div class="logo">STREAMVAULT</div>
</div>

<div class="hero">
<h1>Featured Show</h1>
</div>

<div class="content">

<div class="row">

<div class="row-posters">

<div class="poster-title">Midnight Run</div>
</a>

<a class="poster" href="watch.html?video=dQw4w9WgXcQ&title=Dark%20City">

</a>

</a>

</a>

</div>

</a>
