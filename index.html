<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plueto TV</title>
  <meta name="google-site-verification" content="MO07D2ofQ8ONADL54ZzE3VUSuz77arNLLgCnTAXJEjE" />
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --panel-2:#1c1c26;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --red:#ff4b5c;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:grid;
      grid-template-columns:1fr minmax(320px,560px) 1fr;
      align-items:center;
      gap:20px;
      padding:18px 32px;
      background:rgba(10,10,14,.82);
      backdrop-filter:blur(12px);
      border-bottom:1px solid rgba(255,255,255,.05);
    }

    .nav-left{
      display:flex;
      align-items:center;
      justify-content:flex-start;
      min-width:0;
    }

    .logo{
      font-size:24px;
      font-weight:800;
      letter-spacing:.04em;
      color:var(--purple);
      text-shadow:0 0 24px rgba(122,92,255,.22);
      white-space:nowrap;
    }

    .nav-center{
      display:flex;
      justify-content:center;
      min-width:0;
    }

    .nav-search{
      position:relative;
      overflow:visible;
      width:100%;
      max-width:560px;
      height:50px;
      display:flex;
      align-items:center;
      gap:10px;
      padding:0 16px;
      border-radius:999px;
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.12);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.08),
        0 8px 30px rgba(0,0,0,.22);
      backdrop-filter:blur(18px) saturate(170%);
      -webkit-backdrop-filter:blur(18px) saturate(170%);
    }

    .nav-search:focus-within{
      background:rgba(255,255,255,.11);
      border-color:rgba(122,92,255,.45);
      box-shadow:
        inset 0 1px 0 rgba(255,255,255,.12),
        0 0 0 4px rgba(122,92,255,.10),
        0 10px 32px rgba(0,0,0,.28);
    }

    .search-icon{
      font-size:18px;
      color:rgba(255,255,255,.72);
      flex:0 0 auto;
      user-select:none;
    }

    .nav-search input{
      flex:1;
      height:100%;
      border:none;
      outline:none;
      background:transparent;
      color:var(--text);
      font-size:15px;
    }

    .nav-search input::placeholder{
      color:rgba(255,255,255,.56);
    }

    .nav-right{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
      justify-content:flex-end;
      color:var(--muted);
      min-width:0;
    }

    .nav-right a:hover{color:white}
    .nav-right a.active{color:white}

    .hero{
      position:relative;
      min-height:82vh;
      overflow:hidden;
      display:flex;
      align-items:flex-end;
      background:
        radial-gradient(circle at 80% 18%, rgba(58,168,255,.09), transparent 28%),
        radial-gradient(circle at 18% 12%, rgba(122,92,255,.14), transparent 30%),
        linear-gradient(to bottom, #090a0f 0%, #0d0d12 72%);
    }

    .hero-bg{
      position:absolute;
      inset:0;
      overflow:hidden;
      z-index:0;
    }

    .hero-poster-blur{
      position:absolute;
      inset:-3%;
      width:106%;
      height:106%;
      object-fit:cover;
      object-position:center 24%;
      transform:scale(1.12);
      opacity:.28;
      filter:blur(34px) brightness(.86) saturate(1.04);
      animation:heroBlurFloat 24s ease-in-out infinite alternate;
    }

    .hero-poster{
      position:absolute;
      inset:0;
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center 24%;
      transform:scale(1.06);
      opacity:.5;
      filter:brightness(.92) contrast(1.12) saturate(1.04);
      animation:heroFloat 18s ease-in-out infinite alternate;
    }

    @keyframes heroFloat{
      from{transform:scale(1.06) translateX(0)}
      to{transform:scale(1.1) translateX(-1.2%)}
    }

    @keyframes heroBlurFloat{
      from{transform:scale(1.12) translateX(0)}
      to{transform:scale(1.16) translateX(-1.6%)}
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:
        linear-gradient(to right, rgba(7,8,12,.86) 0%, rgba(7,8,12,.68) 32%, rgba(7,8,12,.28) 58%, rgba(7,8,12,.55) 100%),
        linear-gradient(to top, rgba(13,13,18,1) 0%, rgba(13,13,18,.35) 34%, rgba(13,13,18,.05) 100%);
      z-index:1;
    }

    .hero-content{
      position:relative;
      z-index:2;
      max-width:780px;
      padding:64px 32px 58px;
    }

    .hero-kicker{
      display:inline-flex;
      align-items:center;
      gap:8px;
      color:#d7d7e3;
      font-size:12px;
      letter-spacing:.16em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .hero-kicker::before{
      content:"";
      width:9px;
      height:9px;
      border-radius:999px;
      background:linear-gradient(135deg,var(--purple),var(--blue));
      box-shadow:0 0 14px rgba(122,92,255,.45);
    }

    .hero-title{
      font-size:clamp(2.8rem,6vw,5.8rem);
      line-height:.93;
      font-weight:900;
      margin-bottom:14px;
      max-width:760px;
      letter-spacing:-.03em;
      text-shadow:0 14px 44px rgba(0,0,0,.48);
    }

    .hero-meta{
      display:flex;
      flex-wrap:wrap;
      gap:10px;
      margin-bottom:16px;
    }

    .hero-pill{
      border-radius:999px;
      padding:8px 12px;
      font-size:.92rem;
      color:#dfdfeb;
      background:rgba(255,255,255,.06);
      border:1px solid rgba(255,255,255,.08);
    }

    .hero-desc{
      max-width:660px;
      color:#e1e1e8;
      line-height:1.65;
      font-size:1.03rem;
      margin-bottom:24px;
      text-shadow:0 8px 28px rgba(0,0,0,.34);
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .hero-btn{
      min-height:46px;
      padding:0 18px;
      border-radius:999px;
      display:inline-flex;
      align-items:center;
      justify-content:center;
      font-weight:800;
      border:none;
      cursor:pointer;
    }

    .hero-btn-primary{
      background:linear-gradient(135deg,var(--red),#ff6d4d);
      color:white;
      box-shadow:0 10px 30px rgba(255,75,92,.28);
    }

    .hero-btn-secondary{
      background:rgba(255,255,255,.08);
      border:1px solid rgba(255,255,255,.09);
      color:white;
    }

    .signal-sweep{
      position:absolute;
      inset:0;
      pointer-events:none;
      z-index:3;
      background:linear-gradient(
        110deg,
        transparent 0%,
        rgba(122,92,255,0) 42%,
        rgba(122,92,255,.08) 49%,
        rgba(58,168,255,.07) 52%,
        rgba(122,92,255,0) 58%,
        transparent 100%
      );
      transform:translateX(-120%);
      animation:sweep 9s linear infinite;
    }

    @keyframes sweep{
      0%{transform:translateX(-120%)}
      100%{transform:translateX(120%)}
    }

    .content{
      padding:30px 32px 54px;
    }

    .row-section{margin-bottom:34px}
    .row-title{
      font-size:1.25rem;
      font-weight:800;
      margin-bottom:14px;
      letter-spacing:.02em;
    }

    .row-subtitle{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.5;
      margin:-4px 0 14px;
      max-width:720px;
    }

    .featured-spotlight .row-title{
      font-size:1.45rem;
      margin-bottom:10px;
    }

    .row-track{
      display:grid;
      grid-auto-flow:column;
      grid-auto-columns:minmax(160px,190px);
      gap:18px;
      overflow-x:auto;
      padding-bottom:8px;
      scroll-behavior:smooth;
    }

    .row-track::-webkit-scrollbar{height:8px}
    .row-track::-webkit-scrollbar-thumb{
      background:#2b2b38;
      border-radius:999px;
    }

    .card{
      display:block;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-5px);
    }

    .poster-wrap{
      position:relative;
      width:100%;
      aspect-ratio:2/3;
      border-radius:18px;
      overflow:hidden;
      background:var(--panel);
      box-shadow:0 12px 30px rgba(0,0,0,.28);
    }

    .poster{
      width:100%;
      height:100%;
      object-fit:cover;
      object-position:center;
      display:block;
      background:#111;
    }

    .indie-badge{
      position:absolute;
      top:10px;
      left:10px;
      z-index:2;
      padding:5px 10px;
      border-radius:999px;
      background:rgba(8,8,12,.84);
      border:1px solid rgba(255,255,255,.12);
      color:#fff;
      font-size:.68rem;
      font-weight:800;
      letter-spacing:.08em;
      box-shadow:0 8px 20px rgba(0,0,0,.28);
      pointer-events:none;
    }

    .poster-fallback{
      width:100%;
      height:100%;
      display:none;
      flex-direction:column;
      justify-content:center;
      align-items:center;
      text-align:center;
      padding:22px;
      background:#000;
      color:#fff;
      letter-spacing:.06em;
    }

    .poster-fallback-title{
      font-size:1.15rem;
      font-weight:900;
      line-height:1.2;
      margin-bottom:10px;
      text-transform:uppercase;
    }

    .poster-fallback-meta{
      font-size:.78rem;
      color:rgba(255,255,255,.72);
      line-height:1.45;
    }

    .card-body{padding:10px 4px 0}
    .card-title{
      font-weight:800;
      margin-bottom:5px;
      font-size:.96rem;
      line-height:1.25;
    }
    .meta{
      font-size:13px;
      color:var(--muted);
      line-height:1.4;
    }

    .loading{
      color:var(--muted);
      font-size:15px;
    }

    @media (max-width:980px){
      .navbar{
        grid-template-columns:1fr;
        gap:14px;
      }

      .nav-left,
      .nav-center,
      .nav-right{
        justify-content:center;
      }
    }

    @media (max-width:800px){
      .content,.hero-content{padding-left:18px;padding-right:18px}
      .hero{min-height:72vh}
      .hero-poster-blur{
        width:100%;
        height:100%;
        opacity:.18;
        object-position:center 18%;
      }
      .hero-poster{
        width:100%;
        height:100%;
        opacity:.34;
        object-position:center 18%;
      }
      .row-track{
        grid-auto-columns:minmax(145px,160px);
      }
      .navbar{
        padding-left:18px;
        padding-right:18px;
      }
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <a href="index.html" class="logo">PLUETO TV</a>
    </div>

    <div class="nav-center">
      <form class="nav-search" id="nav-search-form" role="search">
        <span class="search-icon">⌕</span>
        <input
          type="search"
          id="nav-search-input"
          placeholder="Search movies or shows"
          autocomplete="off"
        />
      </form>
    </div>

    <div class="nav-right">
      <a href="index.html" class="active">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">Recently Added</a>
      <a href="my-list.html">My List</a>
      <a href="filmmakers.html">For Filmmakers</a>
    </div>
  </div>

  <section class="hero" id="hero">
    <div class="hero-bg" id="hero-bg"></div>
    <div class="hero-overlay"></div>
    <div class="signal-sweep"></div>
    <div class="hero-content" id="hero-content">
      <div class="loading">Loading feature...</div>
    </div>
  </section>

  <main class="content">
    <section class="row-section featured-spotlight">
      <div class="row-title">Independent Spotlight</div>
      <div class="row-subtitle">A curated selection of films from independent filmmakers.</div>
      <div class="row-track" id="indie-row"><div class="loading">Loading…</div></div>
    </section>

    <section class="row-section">
      <div class="row-title">Plueto Presents</div>
      <div class="row-track" id="featured-row"><div class="loading">Loading…</div></div>
    </section>

    <section class="row-section">
      <div class="row-title">Sci-Fi Showcase</div>
      <div class="row-track" id="scifi-row"><div class="loading">Loading…</div></div>
    </section>

    <section class="row-section">
      <div class="row-title">Midnight Horror</div>
      <div class="row-track" id="horror-row"><div class="loading">Loading…</div></div>
    </section>

    <section class="row-section" id="my-list">
      <div class="row-title">My List</div>
      <div class="row-track" id="my-list-row"><div class="loading">Loading…</div></div>
    </section>

    <section class="row-section">
      <div class="row-title">Animation Block</div>
      <div class="row-track" id="animation-row"><div class="loading">Loading…</div></div>
    </section>
  </main>

  <script>
    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function isIndieItem(item) {
      if (!item) return false;

      const category = String(item.category || "").toLowerCase();
      const source = String(item.source || "").toLowerCase();
      const row = String(item.row || "").toLowerCase();

      return (
        category === "indie" ||
        category === "independent" ||
        source === "submission" ||
        row === "independent spotlight"
      );
    }

    function getPosterForItem(item, posters) {
      if (item.poster && typeof item.poster === "string" && item.poster.trim()) {
        return item.poster;
      }

      const tmdbPoster = posters[item.id];
      if (tmdbPoster && typeof tmdbPoster === "string" && tmdbPoster.trim()) {
        return tmdbPoster;
      }

      if (item.image && typeof item.image === "string" && item.image.trim()) {
        return item.image;
      }

      return null;
    }

    function createCard(item, posters) {
      const yearText = item.year ? item.year : "Unknown year";
      const safeTitle = escapeHtml(item.title);
      const safeDuration = escapeHtml(item.duration || (item.runtime ? `${item.runtime} min` : "Full Movie"));
      const safeRating = escapeHtml(item.rating || "NR");
      const poster = getPosterForItem(item, posters);
      const indieBadge = isIndieItem(item) ? `<div class="indie-badge">INDIE</div>` : "";

      return `
        <a class="card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <div class="poster-wrap">
            ${indieBadge}
            ${
              poster
                ? `<img
                    class="poster"
                    src="${escapeHtml(poster)}"
                    alt="${safeTitle}"
                    loading="lazy"
                    onerror="this.style.display='none'; this.nextElementSibling.style.display='flex';"
                  >`
                : ""
            }
            <div class="poster-fallback" style="${poster ? "" : "display:flex;"}">
              <div class="poster-fallback-title">${safeTitle.toUpperCase()}</div>
              <div class="poster-fallback-meta">
                ${yearText} • ${escapeHtml((item.type || "title").toUpperCase())}<br>
                ${safeDuration} • ${safeRating}
              </div>
            </div>
          </div>

          <div class="card-body">
            <div class="card-title">${safeTitle}</div>
            <div class="meta">${yearText} • ${safeDuration} • ${safeRating}</div>
          </div>
        </a>
      `;
    }

    function renderRow(rowId, items, posters) {
      const row = document.getElementById(rowId);
      if (!row) return;

      if (!items.length) {
        row.innerHTML = `<div class="loading">Nothing here yet.</div>`;
        return;
      }

      row.innerHTML = items.map(item => createCard(item, posters)).join("");
    }

    function renderHero(item, posters) {
      const heroLabel =
        isIndieItem(item) ? "INDEPENDENT SPOTLIGHT" :
        item.row === "Sci-Fi" ? "SCI-FI SHOWCASE" :
        item.row === "Horror" ? "MIDNIGHT HORROR" :
        item.row === "Animation" ? "ANIMATION BLOCK" :
        "FEATURE PRESENTATION";

      const heroPoster = getPosterForItem(item, posters);
      const myListLabel = escapeHtml(getMyListButtonLabel(item.id));

      document.getElementById("hero-bg").innerHTML = heroPoster
        ? `
          <img class="hero-poster-blur" src="${escapeHtml(heroPoster)}" alt="" aria-hidden="true">
          <img class="hero-poster" src="${escapeHtml(heroPoster)}" alt="${escapeHtml(item.title)}">
        `
        : "";

      document.getElementById("hero-content").innerHTML = `
        <div class="hero-kicker">${heroLabel}</div>
        <div class="hero-title">${escapeHtml(item.title)}</div>
        <div class="hero-meta">
          <span class="hero-pill">${escapeHtml(item.year || "—")}</span>
          <span class="hero-pill">${escapeHtml(item.rating || "NR")}</span>
          <span class="hero-pill">${escapeHtml(item.duration || (item.runtime ? `${item.runtime} min` : "Full Movie"))}</span>
          <span class="hero-pill">${escapeHtml(item.row || "Featured")}</span>
        </div>
        <div class="hero-desc">${escapeHtml(item.description || "")}</div>
        <div class="hero-actions">
          <a class="hero-btn hero-btn-primary" href="watch.html?id=${encodeURIComponent(item.id)}">▶ Play</a>
          <button class="hero-btn hero-btn-secondary" id="hero-my-list-btn" type="button">${myListLabel}</button>
        </div>
      `;

      const heroMyListBtn = document.getElementById("hero-my-list-btn");
      if (heroMyListBtn) {
        heroMyListBtn.addEventListener("click", () => {
          toggleMyList(item.id);
          heroMyListBtn.textContent = getMyListButtonLabel(item.id);
          renderHome();
        });
      }
    }

    function isMovie(item) {
      return item && item.type === "movie";
    }

    function wireHomepageSearch() {
      const form = document.getElementById("nav-search-form");
      const input = document.getElementById("nav-search-input");
      if (!form || !input) return;

      const existingBox = document.getElementById("nav-search-results");
      if (existingBox) existingBox.remove();

      const resultsBox = document.createElement("div");
      resultsBox.id = "nav-search-results";
      resultsBox.style.position = "absolute";
      resultsBox.style.top = "calc(100% + 10px)";
      resultsBox.style.left = "0";
      resultsBox.style.width = "100%";
      resultsBox.style.maxHeight = "340px";
      resultsBox.style.overflowY = "auto";
      resultsBox.style.borderRadius = "18px";
      resultsBox.style.background = "rgba(21,21,29,.96)";
      resultsBox.style.border = "1px solid rgba(255,255,255,.08)";
      resultsBox.style.boxShadow = "0 16px 40px rgba(0,0,0,.35)";
      resultsBox.style.backdropFilter = "blur(18px)";
      resultsBox.style.webkitBackdropFilter = "blur(18px)";
      resultsBox.style.display = "none";
      resultsBox.style.zIndex = "200";
      resultsBox.style.padding = "8px";

      form.appendChild(resultsBox);

      function getMatches(query) {
        const q = query.trim().toLowerCase();
        if (!q) return [];

        const allTitles = Array.isArray(window.CATALOG) ? window.CATALOG : [];

        return allTitles
          .filter(item => {
            const title = String(item.title || "").toLowerCase();
            const description = String(item.description || "").toLowerCase();
            const row = String(item.row || "").toLowerCase();
            return title.includes(q) || description.includes(q) || row.includes(q);
          })
          .slice(0, 12);
      }

      function renderResults(matches, query) {
        if (!query.trim()) {
          resultsBox.style.display = "none";
          resultsBox.innerHTML = "";
          return;
        }

        if (!matches.length) {
          resultsBox.innerHTML = `
            <div style="padding:14px 16px; color:rgba(255,255,255,.68); font-size:14px;">
              No results found for "${escapeHtml(query)}"
            </div>
          `;
          resultsBox.style.display = "block";
          return;
        }

        resultsBox.innerHTML = matches.map(item => `
          <a
            href="watch.html?id=${encodeURIComponent(item.id)}"
            style="
              display:flex;
              flex-direction:column;
              gap:4px;
              padding:12px 14px;
              border-radius:12px;
              color:#f4f4f5;
              text-decoration:none;
            "
            onmouseover="this.style.background='rgba(255,255,255,.06)'"
            onmouseout="this.style.background='transparent'"
          >
            <div style="font-weight:700; font-size:14px;">${escapeHtml(item.title || "Untitled")}</div>
            <div style="font-size:12px; color:rgba(255,255,255,.58);">
              ${escapeHtml(item.year || "—")} • ${escapeHtml(item.type || "title")} • ${escapeHtml(item.rating || "NR")}
            </div>
          </a>
        `).join("");

        resultsBox.style.display = "block";
      }

      input.addEventListener("input", () => {
        const query = input.value;
        const matches = getMatches(query);
        renderResults(matches, query);
      });

      form.addEventListener("submit", (event) => {
        event.preventDefault();
        const query = input.value;
        const matches = getMatches(query);

        if (matches.length === 1) {
          window.location.href = `watch.html?id=${encodeURIComponent(matches[0].id)}`;
          return;
        }

        renderResults(matches, query);
      });

      document.addEventListener("click", (event) => {
        if (!form.contains(event.target)) {
          resultsBox.style.display = "none";
        }
      });

      input.addEventListener("focus", () => {
        const query = input.value;
        const matches = getMatches(query);
        if (query.trim()) {
          renderResults(matches, query);
        }
      });
    }

    async function renderHome() {
      let posters = {};
      try {
        const res = await fetch("posters.json");
        posters = await res.json();
      } catch (err) {
        console.warn("Could not load posters.json", err);
      }

      const allTitles = Array.isArray(window.CATALOG) ? window.CATALOG : [];
      const movies = allTitles.filter(isMovie);
      const indieItems = allTitles.filter(isIndieItem);

      const myListIds = getMyList();
      const myListItems = allTitles.filter(item => myListIds.includes(item.id));

      const heroItem =
        allTitles.find(item => item.id === "the-attendant__2026") ||
        movies[0] ||
        allTitles[0];

      if (heroItem) {
        renderHero(heroItem, posters);
      }

      renderRow("indie-row", indieItems, posters);
      renderRow("featured-row", movies.slice(0, 8), posters);
      renderRow("scifi-row", movies.filter(item => item.row === "Sci-Fi"), posters);
      renderRow("horror-row", movies.filter(item => item.row === "Horror"), posters);
      renderRow("animation-row", allTitles.filter(item => item.row === "Animation").slice(0, 18), posters);
      renderRow("my-list-row", myListItems, posters);
    }

    wireHomepageSearch();
    renderHome();
    window.addEventListener("storage", renderHome);
  </script>
</body>
</html>
