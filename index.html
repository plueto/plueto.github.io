<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plueto TV</title>
  <script src="catalog.js"></script>
  <style>
    *{margin:0;padding:0;box-sizing:border-box}
    body{background:#141414;color:#fff;font-family:Arial,Helvetica,sans-serif}
    a{text-decoration:none;color:#fff}
    .navbar{position:fixed;top:0;left:0;width:100%;display:flex;justify-content:space-between;align-items:center;padding:18px 40px;background:linear-gradient(to bottom,rgba(0,0,0,.85),rgba(0,0,0,.25));z-index:100}
    .nav-left{display:flex;align-items:center;gap:28px}
    .logo{font-size:24px;font-weight:700;color:#e50914;letter-spacing:1px}
    .nav-links{display:flex;gap:18px;font-size:14px;color:#ddd}
    .nav-links a:hover{color:#fff}
    .search-box{width:240px;max-width:40vw;padding:10px 14px;border:none;border-radius:6px;outline:none;background:rgba(255,255,255,.12);color:#fff}
    .hero{position:relative;height:78vh;overflow:hidden;display:flex;align-items:flex-end;padding:60px 50px;background:#000}
    .hero video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;opacity:.42}
    .hero::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,#141414 4%,rgba(20,20,20,.2) 40%),linear-gradient(to right,rgba(0,0,0,.82) 18%,rgba(0,0,0,.25) 60%);z-index:1}
    .hero-content{position:relative;z-index:2;max-width:560px}
    .hero h1{font-size:54px;margin-bottom:16px}
    .hero p{color:#e5e5e5;line-height:1.6;margin-bottom:22px;font-size:17px}
    .hero-buttons{display:flex;gap:12px;flex-wrap:wrap}
    .hero-btn{display:inline-block;padding:12px 24px;border-radius:6px;font-weight:700;font-size:16px;transition:.2s;border:none;cursor:pointer}
    .hero-btn.play{background:#fff;color:#000}
    .hero-btn.play:hover{background:#ddd}
    .hero-btn.info,.hero-btn.list{background:rgba(109,109,110,.7);color:#fff}
    .hero-btn.info:hover,.hero-btn.list:hover{background:rgba(109,109,110,.9)}
    .content{padding:20px 40px 50px;margin-top:-70px;position:relative;z-index:5}
    .row{margin-bottom:34px}
    .row.hidden-row{display:none}
    .row h2{margin-bottom:12px;font-size:22px}
    .row-wrap{position:relative}
    .row-posters{display:flex;gap:12px;overflow-x:auto;scroll-behavior:smooth;padding:8px 36px;scrollbar-width:none}
    .row-posters::-webkit-scrollbar{display:none}
    .row-arrow{position:absolute;top:50%;transform:translateY(-50%);width:34px;height:72px;border:none;background:rgba(0,0,0,.55);color:#fff;font-size:24px;cursor:pointer;z-index:20;border-radius:8px}
    .row-arrow:hover{background:rgba(0,0,0,.8)}
    .row-arrow.left{left:0}
    .row-arrow.right{right:0}
    .poster{min-width:220px;height:125px;border-radius:8px;overflow:hidden;position:relative;flex-shrink:0;display:block;transition:transform .25s ease,box-shadow .25s ease;background:#222}
    .poster img,.poster video{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;display:block}
    .poster video{opacity:0;transition:.25s;pointer-events:none}
    .poster::after{content:"";position:absolute;inset:0;background:linear-gradient(to top,rgba(0,0,0,.92),transparent 60%);opacity:0;transition:.25s}
    .poster:hover{transform:scale(1.12);box-shadow:0 20px 40px rgba(0,0,0,.7);z-index:10}
    .poster:hover video{opacity:1}
    .poster:hover::after{opacity:1}
    .poster-title{position:absolute;left:12px;bottom:10px;z-index:3;font-size:15px;font-weight:700;opacity:.92;transition:.25s}
    .poster:hover .poster-title{transform:translateY(-3px);opacity:1}
    .poster-badge{position:absolute;top:10px;left:10px;z-index:3;background:rgba(229,9,20,.95);padding:4px 8px;border-radius:999px;font-size:11px;font-weight:700}
    .footer{margin-top:40px;padding:30px 0 10px;color:#999;font-size:13px}
    .hidden{display:none !important}
    @media (max-width:900px){
      .navbar{padding:16px 20px;gap:12px}
      .nav-links{display:none}
      .search-box{width:180px}
      .hero{padding:30px 20px;height:72vh}
      .hero h1{font-size:36px}
      .hero p{font-size:15px}
      .content{padding:20px 20px 40px}
      .poster{min-width:180px;height:102px}
    }
  </style>
</head>
<body>
  <div class="navbar">
    <div class="nav-left">
      <div class="logo">PLUETO TV</div>
      <div class="nav-links">
        <a href="index.html">Home</a>
        <a href="movies.html">Movies</a>
        <a href="tv.html">TV Shows</a>
        <a href="new.html">New</a>
        <a href="#my-list-row">My List</a>
      </div>
    </div>
    <input type="text" id="searchInput" class="search-box" placeholder="Search titles..." />
  </div>

  <section class="hero" id="heroSection"></section>

  <main class="content">
    <section class="row" id="continue-row">
      <h2>Continue Watching</h2>
      <div class="row-wrap">
        <button class="row-arrow left" type="button">‹</button>
        <div class="row-posters" id="continue-posters"></div>
        <button class="row-arrow right" type="button">›</button>
      </div>
    </section>

    <section class="row" id="my-list-row">
      <h2>My List</h2>
      <div class="row-wrap">
        <button class="row-arrow left" type="button">‹</button>
        <div class="row-posters" id="my-list-posters"></div>
        <button class="row-arrow right" type="button">›</button>
      </div>
    </section>

    <div id="catalogRows"></div>

    <div class="footer">Plueto TV • streaming prototype</div>
  </main>

  <script>
    const getItemById = (id) => CATALOG.find(item => item.id === id);

    function getStoredIds(key) {
      return JSON.parse(localStorage.getItem(key) || "[]");
    }

    function setStoredIds(key, value) {
      localStorage.setItem(key, JSON.stringify(value));
    }

    function isInMyList(id) {
      return getStoredIds("myList").includes(id);
    }

    function toggleMyList(id) {
      const current = getStoredIds("myList");
      const updated = current.includes(id)
        ? current.filter(x => x !== id)
        : [id, ...current];
      setStoredIds("myList", updated);
      renderHero();
      renderMyList();
    }

    function cardHtml(item) {
      return `
        <a class="poster" data-title="${item.title.toLowerCase()}" href="watch.html?id=${item.id}">
          <img src="${item.image}" alt="${item.title}">
          <video muted loop playsinline>
            <source src="${item.preview}" type="video/mp4">
          </video>
          ${item.isNew ? '<div class="poster-badge">NEW</div>' : ''}
          <div class="poster-title">${item.title}</div>
        </a>
      `;
    }

    function renderHero() {
      const heroItem = CATALOG.find(item => item.hero) || CATALOG[0];
      const listText = isInMyList(heroItem.id) ? "✓ In My List" : "+ My List";

      document.getElementById("heroSection").innerHTML = `
        <video autoplay muted loop playsinline>
          <source src="${heroItem.preview}" type="video/mp4">
        </video>
        <div class="hero-content">
          <h1>${heroItem.title}</h1>
          <p>${heroItem.description}</p>
          <div class="hero-buttons">
            <a class="hero-btn play" href="watch.html?id=${heroItem.id}">▶ Play</a>
            <a class="hero-btn info" href="watch.html?id=${heroItem.id}">More Info</a>
            <button class="hero-btn list" type="button" onclick="toggleMyList('${heroItem.id}')">${listText}</button>
          </div>
        </div>
      `;
    }

    function renderCatalogRows() {
      const rowsContainer = document.getElementById("catalogRows");
      const uniqueRows = [...new Set(CATALOG.map(item => item.row))];

      rowsContainer.innerHTML = uniqueRows.map(rowName => {
        const items = CATALOG.filter(item => item.row === rowName);
        return `
          <section class="row" data-row-title="${rowName}">
            <h2>${rowName}</h2>
            <div class="row-wrap">
              <button class="row-arrow left" type="button">‹</button>
              <div class="row-posters">
                ${items.map(cardHtml).join("")}
              </div>
              <button class="row-arrow right" type="button">›</button>
            </div>
          </section>
        `;
      }).join("");
    }

    function renderMyList() {
      const ids = getStoredIds("myList");
      const items = ids.map(getItemById).filter(Boolean);
      const row = document.getElementById("my-list-row");
      const container = document.getElementById("my-list-posters");

      if (!items.length) {
        row.classList.add("hidden-row");
        container.innerHTML = "";
        return;
      }

      row.classList.remove("hidden-row");
      container.innerHTML = items.map(cardHtml).join("");
      attachPosterPreviewEvents(container.querySelectorAll(".poster"));
      attachRowArrows();
    }

    function renderContinueWatching() {
      const ids = getStoredIds("continueWatching");
      const items = ids.map(getItemById).filter(Boolean);
      const row = document.getElementById("continue-row");
      const container = document.getElementById("continue-posters");

      if (!items.length) {
        row.classList.add("hidden-row");
        container.innerHTML = "";
        return;
      }

      row.classList.remove("hidden-row");
      container.innerHTML = items.map(cardHtml).join("");
      attachPosterPreviewEvents(container.querySelectorAll(".poster"));
      attachRowArrows();
    }

    function attachPosterPreviewEvents(posters) {
      posters.forEach((poster) => {
        const video = poster.querySelector("video");
        if (!video || poster.dataset.bound === "true") return;

        poster.dataset.bound = "true";

        poster.addEventListener("mouseenter", () => {
          video.play().catch(() => {});
        });

        poster.addEventListener("mouseleave", () => {
          video.pause();
          video.currentTime = 0;
        });
      });
    }

    function attachRowArrows() {
      document.querySelectorAll(".row-wrap").forEach((wrap) => {
        const row = wrap.querySelector(".row-posters");
        const left = wrap.querySelector(".row-arrow.left");
        const right = wrap.querySelector(".row-arrow.right");
        if (!row || !left || !right || wrap.dataset.bound === "true") return;

        wrap.dataset.bound = "true";
        left.onclick = () => row.scrollBy({ left: -500, behavior: "smooth" });
        right.onclick = () => row.scrollBy({ left: 500, behavior: "smooth" });
      });
    }

    function setupSearch() {
      const searchInput = document.getElementById("searchInput");
      searchInput.addEventListener("input", () => {
        const value = searchInput.value.toLowerCase().trim();

        document.querySelectorAll(".row").forEach((row) => {
          const posters = row.querySelectorAll(".poster");
          let visibleCount = 0;

          posters.forEach((poster) => {
            const title = poster.dataset.title || "";
            const match = title.includes(value) || value === "";
            poster.classList.toggle("hidden", !match);
            if (match) visibleCount++;
          });

          row.classList.toggle("hidden-row", visibleCount === 0);
        });
      });
    }

    renderHero();
    renderCatalogRows();
    renderMyList();
    renderContinueWatching();
    attachPosterPreviewEvents(document.querySelectorAll(".poster"));
    attachRowArrows();
    setupSearch();
  </script>
</body>
</html>
