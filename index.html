<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plueto TV</title>
  <script src="catalog.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --panel-2:#1c1c26;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --red:#ff4b5c;
    }

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
    }

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial, Helvetica, sans-serif;
    }

    a{
      text-decoration:none;
      color:inherit;
    }

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:18px 24px;
      background:rgba(13,13,18,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,0.06);
    }

    .brand{
      color:inherit;
      text-decoration:none;
      font-weight:900;
      letter-spacing:0.08em;
      font-size:1.15rem;
    }

    .nav-links{
      display:flex;
      gap:18px;
      flex-wrap:wrap;
    }

    .nav-links a{
      color:var(--muted);
      font-size:0.95rem;
    }

    .nav-links a:hover,
    .nav-links a.active{
      color:var(--text);
    }

    .hero{
      padding:32px 24px 8px;
    }

    .hero-card{
      min-height:320px;
      border-radius:22px;
      overflow:hidden;
      position:relative;
      background:linear-gradient(135deg,#1a1a24,#101018);
      border:1px solid rgba(255,255,255,0.06);
      display:flex;
      align-items:end;
    }

    .hero-bg{
      position:absolute;
      inset:0;
      background-size:cover;
      background-position:center;
      opacity:0.38;
      filter:saturate(1.05);
    }

    .hero-overlay{
      position:absolute;
      inset:0;
      background:linear-gradient(to top, rgba(0,0,0,0.84), rgba(0,0,0,0.15));
    }

    .hero-content{
      position:relative;
      z-index:2;
      padding:28px;
      max-width:700px;
    }

    .eyebrow{
      color:#c6bfff;
      font-size:0.8rem;
      letter-spacing:0.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    .hero h1{
      font-size:2.1rem;
      margin-bottom:10px;
    }

    .meta{
      color:var(--muted);
      font-size:0.95rem;
      margin-bottom:14px;
    }

    .desc{
      color:#e8e8ee;
      line-height:1.5;
      max-width:58ch;
      margin-bottom:18px;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      font-weight:700;
      border:none;
      cursor:pointer;
    }

    .btn-primary{
      background:var(--text);
      color:#101018;
    }

    .btn-secondary{
      background:rgba(255,255,255,0.1);
      color:var(--text);
      border:1px solid rgba(255,255,255,0.08);
    }

    .section{
      padding:18px 24px 10px;
    }

    .section h2{
      font-size:1.15rem;
      margin-bottom:14px;
    }

    .row{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
      gap:16px;
    }

    .card{
      background:var(--panel);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:18px;
      overflow:hidden;
      transition:transform .18s ease, box-shadow .18s ease;
    }

    .card:hover{
      transform:translateY(-3px);
      box-shadow:0 10px 24px rgba(0,0,0,0.28);
    }

    .poster{
      width:100%;
      aspect-ratio:2/3;
      object-fit:cover;
      background:#111;
      display:block;
    }

    .card-body{
      padding:12px;
    }

    .card-title{
      font-size:0.98rem;
      font-weight:700;
      margin-bottom:6px;
    }

    .card-meta{
      color:var(--muted);
      font-size:0.87rem;
    }

    .empty{
      color:var(--muted);
      background:var(--panel);
      border:1px solid rgba(255,255,255,0.06);
      border-radius:18px;
      padding:18px;
    }

    @media (max-width: 720px){
      .navbar{
        align-items:flex-start;
        flex-direction:column;
        gap:12px;
      }

      .hero h1{
        font-size:1.65rem;
      }
    }
  </style>
</head>
<body>
  <header class="navbar">
    <a href="index.html" class="brand">PLUETO TV</a>

    <nav class="nav-links">
      <a href="index.html" class="active">Home</a>
      <a href="movies.html">Movies</a>
      <a href="tv.html">TV Shows</a>
      <a href="new.html">New</a>
      <a href="my-list.html">My List</a>
    </nav>
  </header>

  <main>
    <section class="hero">
      <div class="hero-card">
        <div class="hero-bg" id="heroBg"></div>
        <div class="hero-overlay"></div>

        <div class="hero-content">
          <div class="eyebrow">Plueto Presents</div>
          <h1 id="heroTitle">Loading feature...</h1>
          <div class="meta" id="heroMeta"></div>
          <p class="desc" id="heroDesc"></p>

          <div class="hero-actions">
            <a id="heroWatch" class="btn btn-primary" href="#">Watch Now</a>
            <a class="btn btn-secondary" href="movies.html">Browse Catalog</a>
          </div>
        </div>
      </div>
    </section>

    <section class="section">
      <h2>Movies</h2>
      <div id="moviesRow" class="row"></div>
    </section>

    <section class="section">
      <h2>TV Shows</h2>
      <div id="tvRow" class="row"></div>
    </section>
  </main>

  <script>
    const catalog = Array.isArray(window.CATALOG) ? window.CATALOG : [];

    const movies = catalog.filter(item => item.type === "movie");
    const tvShows = catalog.filter(item =>
      item.type === "tv" ||
      item.type === "show" ||
      item.type === "series"
    );

    const featured = movies[0] || tvShows[0] || null;

    function cardHTML(item){
      const img = item.image || item.fallbackImage || "";
      return `
        <a class="card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <img
            class="poster"
            src="${img}"
            alt="${item.title}"
            loading="lazy"
            onerror="this.onerror=null; this.src='${item.fallbackImage || item.image || ""}'"
          />
          <div class="card-body">
            <div class="card-title">${item.title}</div>
            <div class="card-meta">${item.year || ""}${item.duration ? " • " + item.duration : ""}</div>
          </div>
        </a>
      `;
    }

    function renderRow(elId, items, emptyText){
      const el = document.getElementById(elId);

      if(!items.length){
        el.innerHTML = `<div class="empty">${emptyText}</div>`;
        return;
      }

      el.innerHTML = items.map(cardHTML).join("");
    }

    if(featured){
      document.getElementById("heroTitle").textContent = featured.title;
      document.getElementById("heroMeta").textContent =
        `${featured.year || ""}${featured.duration ? " • " + featured.duration : ""}${featured.rating ? " • " + featured.rating : ""}`;
      document.getElementById("heroDesc").textContent =
        featured.description || "Now streaming on Plueto TV.";
      document.getElementById("heroWatch").href =
        `watch.html?id=${encodeURIComponent(featured.id)}`;
      document.getElementById("heroBg").style.backgroundImage =
        `url("${featured.image || featured.fallbackImage || ""}")`;
    } else {
      document.getElementById("heroTitle").textContent = "No featured title yet";
      document.getElementById("heroMeta").textContent = "";
      document.getElementById("heroDesc").textContent =
        "Add titles to catalog.js to populate the homepage.";
      document.getElementById("heroWatch").style.display = "none";
    }

    renderRow("moviesRow", movies, "No movies found in catalog.js yet.");
    renderRow("tvRow", tvShows, "No TV shows found yet. Add items with type: \"tv\" in catalog.js.");
  </script>
</body>
</html>
