<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Plueto TV</title>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --panel-2:#1c1c26;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --red:#ff4b5c;
      --border:rgba(255,255,255,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      line-height:1.4;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:20px;
      padding:16px 24px;
      background:rgba(13,13,18,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }

    .brand{
      font-weight:800;
      letter-spacing:1px;
      margin-right:18px;
    }

    .navbar a{
      color:var(--muted);
      font-weight:600;
      transition:color .18s ease;
    }

    .navbar a:hover{
      color:var(--text);
    }

    .hero{
      position:relative;
      min-height:72vh;
      display:grid;
      grid-template-columns:1.1fr .9fr;
      align-items:center;
      gap:28px;
      padding:40px 24px 28px;
      border-bottom:1px solid var(--border);
      background:
        radial-gradient(circle at top left, rgba(122,92,255,0.22), transparent 35%),
        radial-gradient(circle at top right, rgba(58,168,255,0.18), transparent 30%),
        linear-gradient(180deg, #12121a 0%, #0d0d12 100%);
    }

    .hero-copy{
      max-width:700px;
    }

    .eyebrow{
      color:var(--purple);
      font-size:.92rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:14px;
    }

    .hero h1{
      font-size:clamp(2.2rem,5vw,4.4rem);
      line-height:.95;
      margin-bottom:14px;
    }

    .hero p{
      color:var(--muted);
      font-size:1.05rem;
      max-width:58ch;
      margin-bottom:22px;
    }

    .hero-actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      font-weight:700;
      border:1px solid transparent;
      transition:transform .18s ease, opacity .18s ease, border-color .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.95;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--purple),var(--blue));
      color:white;
    }

    .btn-secondary{
      background:transparent;
      border-color:var(--border);
      color:var(--text);
    }

    .hero-visual{
      display:flex;
      justify-content:center;
      align-items:center;
    }

    .hero-card{
      width:min(100%, 520px);
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.35);
    }

    .hero-card img{
      width:100%;
      aspect-ratio:16/10;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .hero-card-body{
      padding:16px;
    }

    .hero-card-body h2{
      font-size:1.2rem;
      margin-bottom:8px;
    }

    .hero-card-body p{
      color:var(--muted);
      font-size:.95rem;
    }

    .page{
      padding:28px 24px 60px;
    }

    .content-row{
      margin-top:30px;
    }

    .content-row h2{
      font-size:1.4rem;
      margin-bottom:14px;
    }

    .poster-row{
      display:grid;
      grid-template-columns:repeat(auto-fill, minmax(170px, 1fr));
      gap:16px;
    }

    .poster-card{
      display:block;
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      overflow:hidden;
      transition:transform .18s ease, border-color .18s ease, box-shadow .18s ease;
    }

    .poster-card:hover{
      transform:translateY(-3px);
      border-color:rgba(122,92,255,.45);
      box-shadow:0 18px 35px rgba(0,0,0,.28);
    }

    .poster-card img{
      width:100%;
      aspect-ratio:2/3;
      object-fit:cover;
      display:block;
      background:#111;
    }

    .poster-meta{
      padding:12px;
    }

    .poster-meta h3{
      font-size:1rem;
      margin-bottom:6px;
    }

    .poster-meta p{
      color:var(--muted);
      font-size:.9rem;
    }

    .empty-row{
      color:var(--muted);
      background:var(--panel);
      border:1px dashed var(--border);
      border-radius:16px;
      padding:18px;
    }

    @media (max-width: 900px){
      .hero{
        grid-template-columns:1fr;
      }

      .hero-visual{
        order:-1;
      }

      .navbar{
        gap:14px;
        overflow-x:auto;
        white-space:nowrap;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">PLUETO TV</a>
    <a href="index.html">Home</a>
    <a href="movies.html">Movies</a>
    <a href="tv.html">TV Shows</a>
    <a href="new.html">Recently Added</a>
    <a href="my-list.html">My List</a>
  </nav>

  <header class="hero">
    <div class="hero-copy">
      <div class="eyebrow">Plueto Presents</div>
      <h1 data-feature-title>Loading feature...</h1>
      <p data-feature-description>Loading…</p>
      <div class="hero-actions">
        <a class="btn btn-primary" data-feature-watch href="watch.html">Watch Now</a>
        <a class="btn btn-secondary" href="my-list.html">Open My List</a>
      </div>
    </div>

    <div class="hero-visual">
      <div class="hero-card">
        <img data-feature-image src="" alt="Featured title" />
        <div class="hero-card-body">
          <h2>Featured Pick</h2>
          <p>Hand-picked from your catalog.</p>
        </div>
      </div>
    </div>
  </header>

  <main class="page">
    <section class="content-row">
      <h2>Sci-Fi Showcase</h2>
      <div class="poster-row" data-row="sci-fi">
        <p class="empty-row">Loading…</p>
      </div>
    </section>

    <section class="content-row">
      <h2>Midnight Horror</h2>
      <div class="poster-row" data-row="horror">
        <p class="empty-row">Loading…</p>
      </div>
    </section>

    <section class="content-row">
      <h2>My List</h2>
      <div class="poster-row" data-row="my-list">
        <p class="empty-row">Loading…</p>
      </div>
    </section>

    <section class="content-row">
      <h2>Animation Block</h2>
      <div class="poster-row" data-row="animation">
        <p class="empty-row">Loading…</p>
      </div>
    </section>
  </main>

  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <script>
    function getCatalog() {
      return Array.isArray(window.CATALOG) ? window.CATALOG : [];
    }

    function createPosterCard(item) {
      return `
        <a class="poster-card" href="watch.html?id=${encodeURIComponent(item.id)}">
          <img
            src="${item.image}"
            alt="${item.title}"
            loading="lazy"
            onerror="this.onerror=null; this.src='${item.fallbackImage || item.image}'"
          />
          <div class="poster-meta">
            <h3>${item.title}</h3>
            <p>${item.year || ""}${item.duration ? " • " + item.duration : ""}</p>
          </div>
        </a>
      `;
    }

    function renderRow(selector, items, emptyText) {
      const row = document.querySelector(selector);
      if (!row) return;

      if (!items.length) {
        row.innerHTML = `<p class="empty-row">${emptyText}</p>`;
        return;
      }

      row.innerHTML = items.map(createPosterCard).join("");
    }

    function renderHomePage() {
      const catalog = getCatalog();

      const featured =
        catalog.find(item => item.row === "Sci-Fi") ||
        catalog[0] ||
        null;

      const sciFi = catalog.filter(item => item.row === "Sci-Fi");
      const horror = catalog.filter(item => item.row === "Horror");
      const animation = catalog.filter(item => item.row === "Animation");

      const myListIds = getMyList();
      const myListItems = myListIds
        .map(id => catalog.find(item => item.id === id))
        .filter(Boolean);

      if (featured) {
        const heroTitle = document.querySelector("[data-feature-title]");
        const heroDescription = document.querySelector("[data-feature-description]");
        const heroWatch = document.querySelector("[data-feature-watch]");
        const heroImage = document.querySelector("[data-feature-image]");

        if (heroTitle) heroTitle.textContent = featured.title;
        if (heroDescription) heroDescription.textContent = featured.description || "";
        if (heroWatch) heroWatch.href = `watch.html?id=${encodeURIComponent(featured.id)}`;
        if (heroImage) {
          heroImage.src = featured.image;
          heroImage.alt = featured.title;
          heroImage.onerror = function () {
            this.onerror = null;
            this.src = featured.fallbackImage || featured.image;
          };
        }
      }

      renderRow("[data-row='sci-fi']", sciFi, "No sci-fi titles yet.");
      renderRow("[data-row='horror']", horror, "No horror titles yet.");
      renderRow("[data-row='my-list']", myListItems, "Your My List is empty.");
      renderRow("[data-row='animation']", animation, "No animation titles yet.");
    }

    document.addEventListener("DOMContentLoaded", renderHomePage);
    window.addEventListener("storage", renderHomePage);
  </script>
</body>
</html>
