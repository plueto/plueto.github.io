<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • Plueto TV</title>
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      line-height:1.4;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:20px;
      padding:16px 24px;
      background:rgba(13,13,18,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid rgba(255,255,255,.08);
    }

    .brand{
      font-weight:800;
      letter-spacing:1px;
      margin-right:18px;
      color:var(--purple);
    }

    .navbar a{
      color:var(--muted);
      font-weight:600;
    }

    .navbar a:hover{color:var(--text)}

    .page{
      padding:24px;
      max-width:1300px;
      margin:0 auto;
    }

    .back-link{
      display:inline-block;
      color:var(--muted);
      margin-bottom:16px;
    }

    .watch-layout{
      display:grid;
      grid-template-columns:1.6fr .9fr;
      gap:24px;
      align-items:start;
    }

    .player-shell{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.3);
    }

    .player-shell video{
      width:100%;
      aspect-ratio:16/9;
      display:block;
      background:#000;
    }

    .info-card{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:22px;
      padding:22px;
    }

    .eyebrow{
      color:var(--purple);
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    h1{
      font-size:clamp(1.8rem,4vw,3rem);
      line-height:1;
      margin-bottom:10px;
    }

    .meta{
      color:var(--muted);
      margin-bottom:16px;
      font-size:.98rem;
    }

    .description{
      margin-bottom:18px;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      font-weight:700;
      border:1px solid transparent;
      cursor:pointer;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--purple),var(--blue));
      color:white;
    }

    .btn-secondary{
      background:transparent;
      border-color:rgba(255,255,255,.08);
      color:var(--text);
    }

    .episode-wrap{
      margin-top:18px;
    }

    .episode-label{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:8px;
    }

    select{
      width:100%;
      background:#0f0f15;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px;
      font-size:.96rem;
    }

    .error-box{
      background:var(--panel);
      border:1px solid rgba(255,255,255,.08);
      border-radius:18px;
      padding:22px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .watch-layout{
        grid-template-columns:1fr;
      }

      .navbar{
        gap:14px;
        overflow-x:auto;
        white-space:nowrap;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">PLUETO TV</a>
    <a href="index.html">Home</a>
    <a href="movies.html">Movies</a>
    <a href="tv.html">TV Shows</a>
    <a href="new.html">Recently Added</a>
    <a href="my-list.html">My List</a>
  </nav>

  <main class="page">
    <a class="back-link" href="javascript:history.back()">← Back</a>

    <div id="watch-app">
      <div class="watch-layout">
        <div class="player-shell">
          <video id="player" controls playsinline></video>
        </div>

        <aside class="info-card">
          <div class="eyebrow">Now Streaming</div>
          <h1 id="watch-title">Loading…</h1>
          <p class="meta" id="watch-meta"></p>
          <p class="description" id="watch-description"></p>

          <div class="actions">
            <button class="btn btn-primary" id="my-list-btn" type="button">+ My List</button>
            <a class="btn btn-secondary" href="my-list.html">Open My List</a>
          </div>

          <div class="episode-wrap" id="episode-wrap" style="display:none;">
            <div class="episode-label">Episodes</div>
            <select id="episode-select"></select>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const catalog = Array.isArray(window.CATALOG) ? window.CATALOG : [];
    const item = catalog.find(entry => entry.id === id);

    const watchApp = document.getElementById("watch-app");
    const titleEl = document.getElementById("watch-title");
    const metaEl = document.getElementById("watch-meta");
    const descEl = document.getElementById("watch-description");
    const playerEl = document.getElementById("player");
    const myListBtn = document.getElementById("my-list-btn");
    const episodeWrap = document.getElementById("episode-wrap");
    const episodeSelect = document.getElementById("episode-select");

    if (!item) {
      watchApp.innerHTML = `
        <div class="error-box">
          <h2 style="margin-bottom:10px;color:#f4f4f5;">Title not found</h2>
          <p style="margin-bottom:16px;">This item is missing from the catalog or the URL is invalid.</p>
          <a class="btn btn-secondary" href="index.html">Return Home</a>
        </div>
      `;
    } else {
      document.title = `${item.title} • Plueto TV`;
      titleEl.textContent = item.title;
      descEl.textContent = item.description || "";

      function refreshMyListButton() {
        myListBtn.textContent = getMyListButtonLabel(item.id);
      }

      refreshMyListButton();
      myListBtn.addEventListener("click", () => {
        toggleMyList(item.id);
        refreshMyListButton();
      });

      if (item.type === "tv" && Array.isArray(item.episodes) && item.episodes.length) {
        metaEl.textContent = `${item.year || "—"} • ${item.episodes.length} episodes • ${item.rating || "TV-G"}`;
        episodeWrap.style.display = "block";

        episodeSelect.innerHTML = item.episodes.map(ep => `
          <option value="${ep.src}">
            Season ${ep.season} • Episode ${ep.episode}
          </option>
        `).join("");

        playerEl.src = item.episodes[0].src;

        episodeSelect.addEventListener("change", () => {
          playerEl.src = episodeSelect.value;
          playerEl.play().catch(() => {});
        });
      } else {
        metaEl.textContent = `${item.year || "—"} • ${item.duration || "Full Movie"} • ${item.rating || "NR"}`;
        playerEl.src = item.preview || "";
      }
    }
  </script>
</body>
</html>
