<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • Plueto TV</title>
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --panel-2:#1c1c26;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --red:#ff4b5c;
      --border:rgba(255,255,255,.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}
    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:20px;
      padding:16px 24px;
      background:rgba(13,13,18,.88);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }

    /* 🔥 ONLY CHANGE IS HERE */
    .brand{
      font-weight:800;
      letter-spacing:.08em;
      color:var(--purple);
      margin-right:8px;
      flex-shrink:0;
      transition:.2s ease;
      text-shadow:0 0 8px rgba(122,92,255,0.6);
    }

    .brand:hover{
      color:#fff;
      text-shadow:0 0 12px rgba(122,92,255,0.9);
    }

    /* everything else unchanged */
    .navbar a{
      color:var(--muted);
      font-size:.95rem;
      transition:.2s ease;
      flex-shrink:0;
    }

    .navbar a:hover,
    .navbar a.active{
      color:#fff;
    }

    .page{
      max-width:1280px;
      margin:0 auto;
      padding:22px 24px 48px;
    }

    .back-link{
      display:inline-block;
      color:var(--muted);
      margin-bottom:18px;
      font-size:.95rem;
    }

    .back-link:hover{
      color:#fff;
    }

    .watch-layout{
      display:grid;
      grid-template-columns:minmax(0,1.7fr) minmax(320px,.9fr);
      gap:24px;
      align-items:start;
    }

    .player-shell{
      background:#000;
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 12px 30px rgba(0,0,0,.28);
      aspect-ratio:16/9;
    }

    .player-shell iframe,
    .player-shell video{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .info-card{
      background:linear-gradient(180deg, rgba(255,255,255,.05), rgba(255,255,255,.02));
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
      box-shadow:0 12px 30px rgba(0,0,0,.22);
      position:sticky;
      top:88px;
    }

    .eyebrow{
      color:var(--purple);
      font-size:.76rem;
      text-transform:uppercase;
      letter-spacing:.12em;
      font-weight:700;
      margin-bottom:10px;
    }

    h1{
      font-size:2rem;
      line-height:1.08;
      margin-bottom:10px;
    }

    .meta{
      color:var(--muted);
      font-size:.96rem;
      line-height:1.6;
      margin-bottom:10px;
    }

    .description{
      color:#e5e7eb;
      line-height:1.7;
      margin:14px 0 0;
    }

    .actions{
      display:flex;
      gap:10px;
      flex-wrap:wrap;
      margin-top:18px;
    }

    .btn{
      appearance:none;
      border:none;
      border-radius:12px;
      padding:12px 16px;
      font-size:.95rem;
      font-weight:700;
      cursor:pointer;
      transition:.2s ease;
      display:inline-flex;
      align-items:center;
      justify-content:center;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--purple),#5d3dff);
      color:#fff;
    }

    .btn-primary:hover{
      transform:translateY(-1px);
      box-shadow:0 8px 18px rgba(122,92,255,.28);
    }

    .btn-secondary{
      background:var(--panel-2);
      color:#fff;
      border:1px solid var(--border);
    }

    .btn-secondary:hover{
      background:#232331;
    }

    .credits-block,
    .episode-wrap{
      margin-top:20px;
      padding-top:18px;
      border-top:1px solid var(--border);
    }

    .episode-label{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:700;
    }

    select{
      width:100%;
      background:#0f0f15;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px;
      font-size:.96rem;
      outline:none;
    }

    select:focus{
      border-color:var(--purple);
    }

    .error-box{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:22px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .watch-layout{
        grid-template-columns:1fr;
      }

      .info-card{
        position:static;
      }

      .navbar{
        gap:14px;
        overflow-x:auto;
        white-space:nowrap;
      }
    }
  </style>
</head>
<body>

<nav class="navbar">
  <a class="brand" href="index.html">PLUETO TV</a>
  <a href="index.html">Home</a>
  <a href="movies.html">Movies</a>
  <a href="tv.html">TV Shows</a>
  <a href="new.html">Recently Added</a>
  <a href="my-list.html">My List</a>
</nav>

<main class="page">
  <a class="back-link" href="javascript:history.back()">← Back</a>

  <div id="watch-app">
    <div class="watch-layout">
      <div class="player-shell" id="player-shell"></div>

      <aside class="info-card">
        <div class="eyebrow">Now Streaming</div>
        <h1 id="watch-title"></h1>
        <p class="meta" id="watch-meta"></p>
        <p class="description" id="watch-description"></p>
        <div id="watch-extra"></div>

        <div class="actions">
          <button class="btn btn-primary" id="my-list-btn">+ My List</button>
          <a class="btn btn-secondary" href="my-list.html">Open My List</a>
        </div>
      </aside>
    </div>
  </div>
</main>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");
const catalog = Array.isArray(window.CATALOG) ? window.CATALOG : [];
const item = catalog.find(entry => entry.id === id);

const titleEl = document.getElementById("watch-title");
const metaEl = document.getElementById("watch-meta");
const descEl = document.getElementById("watch-description");
const playerShellEl = document.getElementById("player-shell");
const extraEl = document.getElementById("watch-extra");

function isEmbedUrl(src){
  return src.includes("youtube") || src.includes("vimeo");
}

function renderEmbedPlayer(src){
  let embed = src;

  if(src.includes("youtu.be")){
    const id = src.split("youtu.be/")[1];
    embed = `https://www.youtube.com/embed/${id}`;
  }

  if(src.includes("watch?v=")){
    const id = new URL(src).searchParams.get("v");
    embed = `https://www.youtube.com/embed/${id}`;
  }

  if(src.includes("vimeo.com") && !src.includes("player.vimeo")){
    const id = src.split("/").pop();
    embed = `https://player.vimeo.com/video/${id}`;
  }

  playerShellEl.innerHTML = `<iframe src="${embed}" allowfullscreen></iframe>`;
}

function renderVideo(src){
  playerShellEl.innerHTML = `<video controls><source src="${src}" type="video/mp4"></video>`;
}

if(item){
  titleEl.textContent = item.title;
  descEl.textContent = item.description || "";
  metaEl.textContent = `${item.year} • ${item.duration}`;

  const src = item.video || item.preview;

  if(isEmbedUrl(src)){
    renderEmbedPlayer(src);
  } else {
    renderVideo(src);
  }
}
</script>

</body>
</html>
