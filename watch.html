<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
      font-family: Arial, Helvetica, sans-serif;
    }

    body {
      background: #141414;
      color: white;
    }

    .topbar {
      padding: 20px 30px;
    }

    .back {
      color: white;
      text-decoration: none;
      font-size: 16px;
      opacity: 0.85;
    }

    .back:hover {
      opacity: 1;
    }

    .container {
      max-width: 1100px;
      margin: 0 auto;
      padding: 20px 30px 50px;
    }

    .title {
      font-size: 34px;
      font-weight: bold;
      margin-bottom: 18px;
    }

    .player-wrap {
      width: 100%;
      aspect-ratio: 16 / 9;
      background: black;
      border-radius: 10px;
      overflow: hidden;
      margin-bottom: 22px;
    }

    .player-wrap iframe {
      width: 100%;
      height: 100%;
      border: none;
    }

    .desc {
      color: #d0d0d0;
      font-size: 16px;
      line-height: 1.6;
      max-width: 800px;
    }
  </style>
</head>
<body>
  <div class="topbar">
    <a class="back" href="index.html">← Back to browse</a>
  </div>

  <div class="container">
    <div class="title" id="video-title">Now Playing</div>

    <div class="player-wrap">
      <iframe
        id="video-frame"
        src=""
        allowfullscreen
        allow="autoplay; encrypted-media; picture-in-picture">
      </iframe>
    </div>

    <div class="desc" id="video-desc">
      Watch page description.
    </div>
  </div>

  <script>
    const params = new URLSearchParams(window.location.search);
    const video = params.get("video") || "jNQXAC9IVRw";
    const title = params.get("title") || "Featured Video";
    const desc = params.get("desc") || "This is a sample watch page.";

    document.getElementById("video-frame").src =
      "https://www.youtube.com/embed/" + video;

    document.getElementById("video-title").textContent = decodeURIComponent(title);
    document.getElementById("video-desc").textContent = decodeURIComponent(desc);
  </script>
</body>
</html>
