<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • Plueto TV</title>

  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>

  <style>
    body {
      margin: 0;
      background: #0d0d12;
      color: #f4f4f5;
      font-family: Arial, Helvetica, sans-serif;
    }

    .container {
      max-width: 1100px;
      margin: auto;
      padding: 20px;
    }

    h1 {
      margin-bottom: 10px;
    }

    .meta {
      color: #a7a7b3;
      margin-bottom: 10px;
    }

    .player-shell {
      width: 100%;
      aspect-ratio: 16/9;
      background: black;
      margin-bottom: 20px;
    }

    iframe, video {
      width: 100%;
      height: 100%;
    }

    .btn {
      padding: 10px 16px;
      border-radius: 6px;
      border: none;
      cursor: pointer;
      margin-right: 10px;
    }

    .btn-secondary {
      background: #1c1c26;
      color: white;
    }

    .credits-block {
      margin-top: 20px;
    }

    .error-box {
      text-align: center;
      padding: 40px;
    }
  </style>
</head>

<body>

<div class="container" id="watch-app">

  <h1 id="watch-title"></h1>
  <div class="meta" id="watch-meta"></div>

  <div class="player-shell" id="player-shell"></div>

  <p id="watch-description"></p>

  <button class="btn btn-secondary" id="my-list-btn">My List</button>

  <div id="watch-extra"></div>

</div>

<script>
const params = new URLSearchParams(window.location.search);
const id = params.get("id");

const catalog = Array.isArray(window.CATALOG) ? window.CATALOG : [];
const item = catalog.find(entry => entry.id === id);

const titleEl = document.getElementById("watch-title");
const metaEl = document.getElementById("watch-meta");
const descEl = document.getElementById("watch-description");
const playerShellEl = document.getElementById("player-shell");
const extraEl = document.getElementById("watch-extra");
const myListBtn = document.getElementById("my-list-btn");

function escapeHtml(value) {
  return String(value ?? "")
    .replaceAll("&", "&amp;")
    .replaceAll("<", "&lt;")
    .replaceAll(">", "&gt;")
    .replaceAll('"', "&quot;")
    .replaceAll("'", "&#39;");
}

function isEmbedUrl(src) {
  return (
    src.includes("youtube.com") ||
    src.includes("youtu.be") ||
    src.includes("vimeo.com")
  );
}

function renderEmbedPlayer(src, title) {
  let embedSrc = src;

  if (src.includes("youtu.be/")) {
    const videoId = src.split("youtu.be/")[1].split("?")[0];
    embedSrc = `https://www.youtube.com/embed/${videoId}`;
  }

  if (src.includes("youtube.com/watch")) {
    const videoId = new URL(src).searchParams.get("v");
    embedSrc = `https://www.youtube.com/embed/${videoId}`;
  }

  if (src.includes("vimeo.com/") && !src.includes("player.vimeo.com")) {
    const clean = src.split("?")[0];
    const parts = clean.split("/");
    const videoId = parts[parts.length - 1];
    embedSrc = `https://player.vimeo.com/video/${videoId}`;
  }

  playerShellEl.innerHTML = `
    <iframe
      src="${escapeHtml(embedSrc)}"
      frameborder="0"
      allowfullscreen
      allow="autoplay; fullscreen; picture-in-picture"
      title="${escapeHtml(title)}"
    ></iframe>
  `;
}

function renderVideoPlayer(src) {
  playerShellEl.innerHTML = `
    <video controls playsinline controlslist="nodownload">
      <source src="${escapeHtml(src)}" type="video/mp4">
    </video>
  `;
}

function renderExtraInfo(entry) {
  let html = "";

  if (entry.director) {
    html += `<p class="meta"><strong>Director:</strong> ${escapeHtml(entry.director)}</p>`;
  }

  if (entry.country) {
    html += `<p class="meta"><strong>Country:</strong> ${escapeHtml(entry.country)}</p>`;
  }

  if (entry.runtime) {
    const runtimeText = typeof entry.runtime === "number"
      ? `${entry.runtime} minutes`
      : entry.runtime;

    html += `<p class="meta"><strong>Runtime:</strong> ${escapeHtml(runtimeText)}</p>`;
  }

  if (entry.genre) {
    html += `<p class="meta"><strong>Genre:</strong> ${escapeHtml(entry.genre)}</p>`;
  }

  if (entry.credits) {

    if (Array.isArray(entry.credits)) {
      html += `
        <div class="credits-block">
          <p class="meta"><strong>Credits</strong></p>
          <p class="meta">${entry.credits.map(escapeHtml).join("<br>")}</p>
        </div>
      `;
    } else {

      if (entry.credits.general) {
        html += `
          <div class="credits-block">
            <p class="meta"><strong>Credits</strong></p>
            <p class="meta">${entry.credits.general.map(escapeHtml).join("<br>")}</p>
          </div>
        `;
      }

      if (entry.credits.music) {
        html += `
          <div class="credits-block">
            <p class="meta"><strong>Music</strong></p>
            <p class="meta">${entry.credits.music.map(escapeHtml).join("<br>")}</p>
          </div>
        `;
      }

      if (entry.credits.soundEffects) {
        html += `
          <div class="credits-block">
            <p class="meta"><strong>Sound Effects</strong></p>
            <p class="meta">${entry.credits.soundEffects.map(escapeHtml).join("<br>")}</p>
          </div>
        `;
      }
    }
  }

  extraEl.innerHTML = html;
}

if (!item) {
  document.getElementById("watch-app").innerHTML = `
    <div class="error-box">
      <h2>Title not found</h2>
      <a href="index.html">Return Home</a>
    </div>
  `;
} else {

  document.title = item.title + " • Plueto TV";

  titleEl.textContent = item.title;
  descEl.textContent = item.description || "";

  metaEl.textContent = `${item.year || "—"} • ${item.duration || "Full Movie"} • ${item.rating || "NR"}`;

  renderExtraInfo(item);

  const src = item.video || item.preview || item.src || "";

  if (isEmbedUrl(src)) {
    renderEmbedPlayer(src, item.title);
  } else {
    renderVideoPlayer(src);
  }

  if (myListBtn && typeof toggleMyList === "function") {
    myListBtn.addEventListener("click", () => {
      toggleMyList(item.id);
    });
  }
}
</script>

</body>
</html>
