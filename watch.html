<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • Plueto TV</title>
  <script src="catalog.js" defer></script>
  <style>
    body {
      margin: 0;
      background: #0b0b0f;
      color: white;
      font-family: Arial, sans-serif;
    }

    .wrap {
      max-width: 1200px;
      margin: 0 auto;
      padding: 24px;
    }

    .topbar {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    a {
      color: white;
      text-decoration: none;
    }

    .player-shell {
      background: #111;
      border-radius: 18px;
      overflow: hidden;
      box-shadow: 0 20px 50px rgba(0,0,0,.45);
    }

    .player-shell iframe {
      width: 100%;
      height: 70vh;
      min-height: 420px;
      border: 0;
      display: block;
    }

    .meta {
      margin-top: 20px;
    }

    .title {
      font-size: 2rem;
      font-weight: 700;
      margin-bottom: 10px;
    }

    .submeta {
      display: flex;
      gap: 10px;
      flex-wrap: wrap;
      color: #bdbdbd;
      margin-bottom: 14px;
    }

    .pill {
      border: 1px solid rgba(255,255,255,.16);
      border-radius: 999px;
      padding: 6px 10px;
      background: rgba(255,255,255,.05);
    }

    .desc {
      max-width: 800px;
      line-height: 1.6;
      color: #ddd;
    }

    .actions {
      margin-top: 18px;
      display: flex;
      gap: 12px;
    }

    button {
      border: 0;
      border-radius: 999px;
      padding: 12px 18px;
      font-weight: 700;
      cursor: pointer;
    }

    .btn-main {
      background: white;
      color: black;
    }

    .btn-alt {
      background: rgba(255,255,255,.08);
      color: white;
      border: 1px solid rgba(255,255,255,.14);
    }

    .error {
      padding: 32px;
      background: #161616;
      border-radius: 18px;
      color: #ddd;
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="topbar">
      <a href="movies.html">← Back to browse</a>
      <a href="index.html">Home</a>
    </div>

    <div id="watch-app"></div>
  </div>

  <script>
    window.addEventListener("DOMContentLoaded", () => {
      const params = new URLSearchParams(window.location.search);
      const id = params.get("id");
      const app = document.getElementById("watch-app");

      if (typeof CATALOG === "undefined" || !Array.isArray(CATALOG)) {
        app.innerHTML = `
          <div class="error">
            <h2>Catalog failed to load</h2>
            <p>catalog.js did not load correctly.</p>
          </div>
        `;
        return;
      }

      const item = CATALOG.find(movie => movie.id === id);

      if (!item) {
        app.innerHTML = `
          <div class="error">
            <h2>Movie not found</h2>
            <p>That title is not in the catalog yet.</p>
          </div>
        `;
        return;
      }

      app.innerHTML = `
        <div class="player-shell">
          <iframe
            src="https://archive.org/embed/${item.id}"
            allowfullscreen
            webkitallowfullscreen="true"
            mozallowfullscreen="true">
          </iframe>
        </div>

        <div class="meta">
          <div class="title">${item.title}</div>

          <div class="submeta">
            <span class="pill">${item.year}</span>
            <span class="pill">${item.rating}</span>
            <span class="pill">${item.duration}</span>
            <span class="pill">${item.row}</span>
          </div>

          <div class="desc">${item.description}</div>

          <div class="actions">
            <button class="btn-main" onclick="location.reload()">⟳ Reload</button>
            <button class="btn-alt" onclick="toggleMyList('${item.id}')">+ My List</button>
          </div>
        </div>
      `;
    });
  </script>
</body>
</html>
