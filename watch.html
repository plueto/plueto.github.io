<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Watch • Plueto TV</title>
  <script src="catalog.js"></script>
  <script src="my-list-utils.js"></script>
  <style>
    :root{
      --bg:#0d0d12;
      --panel:#15151d;
      --panel-2:#1c1c26;
      --text:#f4f4f5;
      --muted:#a7a7b3;
      --purple:#7a5cff;
      --blue:#3aa8ff;
      --border:rgba(255,255,255,0.08);
    }

    *{margin:0;padding:0;box-sizing:border-box}

    body{
      background:var(--bg);
      color:var(--text);
      font-family:Arial,Helvetica,sans-serif;
      line-height:1.4;
    }

    a{text-decoration:none;color:inherit}

    .navbar{
      position:sticky;
      top:0;
      z-index:50;
      display:flex;
      align-items:center;
      gap:20px;
      padding:16px 24px;
      background:rgba(13,13,18,0.92);
      backdrop-filter:blur(10px);
      border-bottom:1px solid var(--border);
    }

    .brand{
      font-weight:800;
      letter-spacing:1px;
      margin-right:18px;
      color:var(--purple);
    }

    .navbar a{
      color:var(--muted);
      font-weight:600;
      transition:color .18s ease;
    }

    .navbar a:hover{
      color:var(--text);
    }

    .page{
      padding:24px;
      max-width:1300px;
      margin:0 auto;
    }

    .back-link{
      display:inline-block;
      color:var(--muted);
      margin-bottom:16px;
    }

    .watch-layout{
      display:grid;
      grid-template-columns:1.6fr .9fr;
      gap:24px;
      align-items:start;
    }

    .player-shell{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      overflow:hidden;
      box-shadow:0 24px 60px rgba(0,0,0,.3);
    }

    .player-frame{
      width:100%;
      aspect-ratio:16/9;
      background:#000;
      display:block;
      border:0;
    }

    .player-frame video,
    .player-frame iframe{
      width:100%;
      height:100%;
      border:0;
      display:block;
      background:#000;
    }

    .info-card{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:22px;
      padding:22px;
    }

    .eyebrow{
      color:var(--purple);
      font-size:.9rem;
      font-weight:700;
      letter-spacing:.12em;
      text-transform:uppercase;
      margin-bottom:10px;
    }

    h1{
      font-size:clamp(1.8rem,4vw,3rem);
      line-height:1;
      margin-bottom:10px;
    }

    .meta{
      color:var(--muted);
      margin-bottom:12px;
      font-size:.98rem;
    }

    .submeta{
      color:var(--muted);
      margin-bottom:12px;
      font-size:.95rem;
      line-height:1.55;
    }

    .description{
      color:var(--text);
      margin-bottom:18px;
      line-height:1.65;
    }

    .actions{
      display:flex;
      gap:12px;
      flex-wrap:wrap;
      margin-bottom:18px;
    }

    .btn{
      display:inline-flex;
      align-items:center;
      justify-content:center;
      padding:12px 18px;
      border-radius:999px;
      font-weight:700;
      border:1px solid transparent;
      cursor:pointer;
      transition:transform .18s ease, opacity .18s ease, border-color .18s ease;
    }

    .btn:hover{
      transform:translateY(-1px);
      opacity:.95;
    }

    .btn-primary{
      background:linear-gradient(135deg,var(--purple),var(--blue));
      color:white;
    }

    .btn-secondary{
      background:transparent;
      border-color:var(--border);
      color:var(--text);
    }

    .episode-wrap{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--border);
    }

    .episode-label{
      font-size:.86rem;
      color:var(--muted);
      margin-bottom:8px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:700;
    }

    select{
      width:100%;
      background:#0f0f15;
      color:#fff;
      border:1px solid rgba(255,255,255,.12);
      border-radius:12px;
      padding:12px;
      font-size:.96rem;
      outline:none;
    }

    select:focus{
      border-color:var(--purple);
    }

    .detail-block{
      margin-top:18px;
      padding-top:18px;
      border-top:1px solid var(--border);
    }

    .detail-title{
      font-size:.82rem;
      color:var(--muted);
      margin-bottom:10px;
      text-transform:uppercase;
      letter-spacing:.08em;
      font-weight:700;
    }

    .detail-list{
      display:flex;
      flex-direction:column;
      gap:8px;
      color:var(--text);
      font-size:.95rem;
      line-height:1.55;
    }

    .credit-group{
      margin-bottom:12px;
    }

    .credit-group strong{
      display:block;
      margin-bottom:4px;
      color:#fff;
    }

    .error-box{
      background:var(--panel);
      border:1px solid var(--border);
      border-radius:18px;
      padding:22px;
      color:var(--muted);
    }

    @media (max-width: 980px){
      .watch-layout{
        grid-template-columns:1fr;
      }

      .navbar{
        gap:14px;
        overflow-x:auto;
        white-space:nowrap;
      }
    }
  </style>
</head>
<body>
  <nav class="navbar">
    <a class="brand" href="index.html">PLUETO TV</a>
    <a href="index.html">Home</a>
    <a href="movies.html">Movies</a>
    <a href="tv.html">TV Shows</a>
    <a href="new.html">Recently Added</a>
    <a href="my-list.html">My List</a>
  </nav>

  <main class="page">
    <a class="back-link" href="javascript:history.back()">← Back</a>

    <div id="watch-app">
      <div class="watch-layout">
        <div class="player-shell">
          <div class="player-frame" id="player-frame">
            <video id="player" controls playsinline controlslist="nodownload"></video>
          </div>
        </div>

        <aside class="info-card">
          <div class="eyebrow" id="watch-eyebrow">Now Streaming</div>
          <h1 id="watch-title">Loading…</h1>
          <p class="meta" id="watch-meta"></p>
          <p class="submeta" id="watch-submeta"></p>
          <p class="description" id="watch-description"></p>

          <div class="actions">
            <button class="btn btn-primary" id="my-list-btn" type="button">+ My List</button>
            <a class="btn btn-secondary" href="my-list.html">Open My List</a>
          </div>

          <div class="episode-wrap" id="episode-wrap" style="display:none;">
            <div class="episode-label">Episodes</div>
            <select id="episode-select"></select>
          </div>

          <div class="detail-block" id="credits-wrap" style="display:none;">
            <div class="detail-title">Credits</div>
            <div class="detail-list" id="credits-content"></div>
          </div>
        </aside>
      </div>
    </div>
  </main>

  <script>
    const params = new URLSearchParams(window.location.search);
    const id = params.get("id");
    const catalog = Array.isArray(window.CATALOG) ? window.CATALOG : [];
    const item = catalog.find(entry => entry.id === id);

    const watchApp = document.getElementById("watch-app");
    const titleEl = document.getElementById("watch-title");
    const metaEl = document.getElementById("watch-meta");
    const submetaEl = document.getElementById("watch-submeta");
    const descEl = document.getElementById("watch-description");
    const playerFrameEl = document.getElementById("player-frame");
    const playerEl = document.getElementById("player");
    const myListBtn = document.getElementById("my-list-btn");
    const episodeWrap = document.getElementById("episode-wrap");
    const episodeSelect = document.getElementById("episode-select");
    const creditsWrap = document.getElementById("credits-wrap");
    const creditsContent = document.getElementById("credits-content");
    const eyebrowEl = document.getElementById("watch-eyebrow");

    function escapeHtml(value) {
      return String(value ?? "")
        .replaceAll("&", "&amp;")
        .replaceAll("<", "&lt;")
        .replaceAll(">", "&gt;")
        .replaceAll('"', "&quot;")
        .replaceAll("'", "&#39;");
    }

    function formatEpisodeLabel(ep) {
      return `Season ${ep.season} • Episode ${ep.episode}`;
    }

    function isIndieItem(entry) {
      if (!entry) return false;
      const category = String(entry.category || "").toLowerCase();
      const source = String(entry.source || "").toLowerCase();
      const row = String(entry.row || "").toLowerCase();
      return (
        category === "indie" ||
        category === "independent" ||
        source === "submission" ||
        row === "independent spotlight"
      );
    }

    function getEmbedUrl(url) {
      if (!url) return "";

      const clean = String(url).trim();

      if (clean.includes("youtube.com/embed/")) {
        return clean;
      }

      if (clean.includes("youtu.be/")) {
        const videoId = clean.split("youtu.be/")[1].split("?")[0];
        return `https://www.youtube.com/embed/${videoId}`;
      }

      if (clean.includes("youtube.com/watch?v=")) {
        const urlObj = new URL(clean);
        const videoId = urlObj.searchParams.get("v");
        return videoId ? `https://www.youtube.com/embed/${videoId}` : clean;
      }

      if (clean.includes("vimeo.com/")) {
        const match = clean.match(/vimeo\.com\/(\d+)/);
        if (match && match[1]) {
          return `https://player.vimeo.com/video/${match[1]}`;
        }
      }

      return clean;
    }

    function isEmbeddableVideo(url) {
      if (!url) return false;
      const lower = String(url).toLowerCase();
      return (
        lower.includes("youtube.com/embed/") ||
        lower.includes("youtu.be/") ||
        lower.includes("youtube.com/watch?v=") ||
        lower.includes("vimeo.com/")
      );
    }

    function renderVideoPlayer(url, title) {
      playerFrameEl.innerHTML = `
        <video id="player" controls playsinline controlslist="nodownload">
          <source src="${escapeHtml(url)}" type="video/mp4">
        </video>
      `;
    }

    function renderEmbedPlayer(url, title) {
      const embedUrl = getEmbedUrl(url);
      playerFrameEl.innerHTML = `
        <iframe
          src="${escapeHtml(embedUrl)}"
          title="${escapeHtml(title)}"
          allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share"
          allowfullscreen
          referrerpolicy="strict-origin-when-cross-origin">
        </iframe>
      `;
    }

    function renderCredits(entry) {
      if (!entry.credits || typeof entry.credits !== "object") {
        creditsWrap.style.display = "none";
        creditsContent.innerHTML = "";
        return;
      }

      const blocks = [];

      if (Array.isArray(entry.credits.music) && entry.credits.music.length) {
        blocks.push(`
          <div class="credit-group">
            <strong>Music</strong>
            <div>${entry.credits.music.map(escapeHtml).join("<br>")}</div>
          </div>
        `);
      }

      if (Array.isArray(entry.credits.soundEffects) && entry.credits.soundEffects.length) {
        blocks.push(`
          <div class="credit-group">
            <strong>Sound Effects</strong>
            <div>${entry.credits.soundEffects.map(escapeHtml).join("<br>")}</div>
          </div>
        `);
      }

      if (!blocks.length) {
        creditsWrap.style.display = "none";
        creditsContent.innerHTML = "";
        return;
      }

      creditsWrap.style.display = "block";
      creditsContent.innerHTML = blocks.join("");
    }

    if (!item) {
      watchApp.innerHTML = `
        <div class="error-box">
          <h2 style="margin-bottom:10px;color:#f4f4f5;">Title not found</h2>
          <p style="margin-bottom:16px;">This item is missing from the catalog or the URL is invalid.</p>
          <a class="btn btn-secondary" href="index.html">Return Home</a>
        </div>
      `;
    } else {
      document.title = `${item.title} • Plueto TV`;
      titleEl.textContent = item.title;
      descEl.textContent = item.description || "";

      function refreshMyListButton() {
        if (!myListBtn) return;
        myListBtn.textContent = getMyListButtonLabel(item.id);
      }

      refreshMyListButton();

      myListBtn.addEventListener("click", () => {
        toggleMyList(item.id);
        refreshMyListButton();
      });

      if (item.type === "tv" && Array.isArray(item.episodes) && item.episodes.length) {
        eyebrowEl.textContent = "Now Streaming";
        metaEl.textContent = `${item.year || "—"} • ${item.episodes.length} episodes • ${item.rating || "TV-G"}`;
        submetaEl.textContent = item.genre || item.row || "";
        episodeWrap.style.display = "block";

        episodeSelect.innerHTML = item.episodes.map((ep, index) => `
          <option value="${escapeHtml(ep.src)}" ${index === 0 ? "selected" : ""}>
            ${formatEpisodeLabel(ep)}
          </option>
        `).join("");

        renderVideoPlayer(item.episodes[0].src, item.title);

        episodeSelect.addEventListener("change", () => {
          renderVideoPlayer(episodeSelect.value, item.title);
        });

        renderCredits(item);
      } else {
        const durationText = item.duration || (item.runtime ? `${item.runtime} min` : "Full Movie");
        const primaryMeta = [
          item.year || "—",
          durationText,
          item.rating || "NR"
        ].filter(Boolean).join(" • ");

        metaEl.textContent = primaryMeta;

        const submetaParts = [];
        if (item.director) submetaParts.push(`Directed by ${item.director}`);
        if (item.country) submetaParts.push(item.country);
        if (item.genre) submetaParts.push(item.genre);
        if (item.subgenre) submetaParts.push(item.subgenre);
        if (item.vibe) submetaParts.push(item.vibe);

        submetaEl.textContent = submetaParts.join(" • ");

        eyebrowEl.textContent = isIndieItem(item) ? "Independent Spotlight" : "Now Streaming";

        const videoSource = item.video || item.preview || item.src || "";

        if (isEmbeddableVideo(videoSource)) {
          renderEmbedPlayer(videoSource, item.title);
        } else {
          renderVideoPlayer(videoSource, item.title);
        }

        renderCredits(item);
      }
    }
  </script>
</body>
</html>
